name: "🐳 Build: CI Images (all distros)"

on:
  workflow_call:
    inputs:
      distros:
        description: "Space-separated distro list"
        required: true
        type: string
      checkout_ref:
        description: "Optional git ref to checkout before build (default: event ref)"
        required: false
        type: string
        default: ""
      image_tag:
        description: "Optional image tag override (default: ci-${github.sha})"
        required: false
        type: string
        default: ""
      concurrency_channel:
        description: "Optional channel to separate concurrency groups between callers"
        required: false
        type: string
        default: "default"

permissions:
  contents: read
  packages: write

concurrency:
  group: infinito-build-${{ github.repository }}-${{ inputs.concurrency_channel }}-${{ inputs.checkout_ref || github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: 🏷️ Label images
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.out.outputs.matrix }}
      image_tag: ${{ steps.out.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v7

      - name: 📦 Install jq
        run: ./scripts/install/apt.sh jq

      - name: Compute matrix JSON
        id: out
        run: scripts/github/runner/images_build_outputs.sh "${{ inputs.distros }}" "${{ inputs.image_tag }}"

  build:
    name: 🏗️ Build (${{ matrix.distro }})
    needs: prepare
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        distro: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout trusted workflow repo (helpers)
        uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Checkout source to build
        uses: actions/checkout@v7
        with:
          repository: ${{ github.repository }}
          ref: ${{ inputs.checkout_ref || github.ref }}
          path: _src
          persist-credentials: false

      - name: Disk pressure (start)
        shell: bash
        run: bash scripts/github/runner/disk_pressure_report.sh START

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Disk pressure (pre-build)
        shell: bash
        run: bash scripts/github/runner/disk_pressure_report.sh PRE-BUILD

      - name: 🔍 Resolve repository owner
        id: owner
        shell: bash
        run: |
          set -euo pipefail
          echo "owner=$(scripts/meta/resolve/repository/owner.sh)" >> "$GITHUB_OUTPUT"

      - name: Build & push (retry 7x, 20s)
        if: ${{ !(github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository) }}
        shell: bash
        env:
          GITHUB_REPOSITORY_OWNER: ${{ steps.owner.outputs.owner }}
          BUILD_CONTEXT_DIR: _src
          MATRIX_DISTRO: ${{ matrix.distro }}
          IMAGE_TAG: ${{ needs.prepare.outputs.image_tag }}
          USE_NIX_TOKEN: ${{ !(github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository) }}
          NIX_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAX_ATTEMPTS: "7"
          RETRY_DELAY_SECONDS: "20"
        run: ./scripts/image/push.sh

      - name: Disk pressure (post-build)
        if: always()
        shell: bash
        run: bash scripts/github/runner/disk_pressure_report.sh POST-BUILD

      - name: Cleanup (always)
        if: always()
        shell: bash
        run: bash scripts/github/runner/cleanup_docker.sh
