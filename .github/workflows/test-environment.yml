name: "💻 Test: Development Environment"

on:
  workflow_dispatch:
  workflow_call:

permissions:
  actions: write
  contents: read
  packages: read

jobs:
  test-environment:
    name: 🧑‍💻 Environment (${{ matrix.dev_runtime_image }})
    runs-on: ubuntu-latest
    timeout-minutes: 270

    strategy:
      fail-fast: false
      matrix:
        dev_runtime_image:
          - manjarolinux/base
          - debian:bookworm
          - ubuntu:latest
          - fedora:latest
          - quay.io/centos/centos:latest

    env:
      DEV_RUNTIME_IMAGE: ${{ matrix.dev_runtime_image }}
      NIX_CONFIG: |
        access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      # Cache caps sized for post-prune re-pulls; paths on /mnt to spare the small / partition.
      INFINITO_CACHE_REGISTRY_MAX_SIZE: 16g
      INFINITO_CACHE_REGISTRY_HOST_PATH: /mnt/cache/registry/mirror
      INFINITO_CACHE_REGISTRY_CA_HOST_PATH: /mnt/cache/registry/ca
      INFINITO_CACHE_PACKAGE_BLOBSTORE_MAX: 8g
      INFINITO_CACHE_PACKAGE_HEAP: 1g
      INFINITO_CACHE_PACKAGE_DIRECT_MEM: 1g
      INFINITO_CACHE_PACKAGE_HOST_PATH: /mnt/cache/package/data

    steps:
      # Reclaim host space before Docker pulls (rationale: docs/contributing/artefact/files/github/workflow.md); swap-storage stays since no enlarge_swap.sh replacement exists here.
      - name: 🧹 Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Run dev environment routine
        shell: bash
        run: |
          set -euo pipefail
          HOST_WORKDIR="$(pwd -P)"

          # Build the dev image locally and mirror the host workdir path inside the container so docker compose can reach the host daemon via /var/run/docker.sock.
          docker run --rm \
            -e GITHUB_ACTIONS=true \
            -e GITHUB_REPOSITORY="${{ github.repository }}" \
            -e GITHUB_REPOSITORY_OWNER="${{ github.repository_owner }}" \
            -e GITHUB_SHA="${{ github.sha }}" \
            -e DEV_RUNTIME_IMAGE \
            -e INFINITO_DISTRO=debian \
            -e INFINITO_IMAGE=infinito-debian \
            -e INFINITO_PULL_POLICY=never \
            -e INFINITO_BUILD=1 \
            -e NIX_CONFIG \
            -e INFINITO_CACHE_REGISTRY_MAX_SIZE \
            -e INFINITO_CACHE_REGISTRY_HOST_PATH \
            -e INFINITO_CACHE_REGISTRY_CA_HOST_PATH \
            -e INFINITO_CACHE_PACKAGE_BLOBSTORE_MAX \
            -e INFINITO_CACHE_PACKAGE_HEAP \
            -e INFINITO_CACHE_PACKAGE_DIRECT_MEM \
            -e INFINITO_CACHE_PACKAGE_HOST_PATH \
            --network host \
            -v "${HOST_WORKDIR}:${HOST_WORKDIR}" \
            -v "/mnt/docker:/var/lib/docker" \
            -v "/var/run/docker.sock:/var/run/docker.sock" \
            -w "${HOST_WORKDIR}" \
            "${DEV_RUNTIME_IMAGE}" \
            bash -lc '
              bash ./scripts/tests/environment/00_orchestrator.sh
            '
