name: "📥 Test: Install Make"

on:
  workflow_call:

permissions:
  actions: write
  contents: read
  packages: read

jobs:
  test-install-make:
    name: 🛠️ Makefile
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NIX_CONFIG: |
        access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        distro: [arch, debian, ubuntu, fedora, centos]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Resolve paths from default.env
        run: |
          for key in INFINITO_SRC_DIR INFINITO_VENV_DIR; do
            value="$(awk -F= -v k="^${key}=" '$0 ~ k {print $2; exit}' default.env)"
            test -n "${value}" || { echo "${key} not found in default.env" >&2; exit 1; }
            echo "${key}=${value}" >> "$GITHUB_ENV"
          done

      - name: Install & test in pkgmgr virgin container
        run: |
          docker run --rm \
            -e NIX_CONFIG="${NIX_CONFIG}" \
            -e INFINITO_SRC_DIR="${INFINITO_SRC_DIR}" \
            -e INFINITO_VENV_DIR="${INFINITO_VENV_DIR}" \
            -v "$(pwd):${INFINITO_SRC_DIR}" \
            -w "${INFINITO_SRC_DIR}" \
            "ghcr.io/kevinveenbirkenbach/pkgmgr-${{ matrix.distro }}-virgin:stable" \
            bash -lc '
              set -euo pipefail
              make install
              make setup
              source "${INFINITO_VENV_DIR}/bin/activate"
              infinito --help
            '
