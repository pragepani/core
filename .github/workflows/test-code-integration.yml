name: "🧪 Test: Code (Integration)"

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test-code-integration:
    name: 🧪 Test integration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      INFINITO_TEST_RUNNER: host

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Run integration tests via make
        shell: bash
        run: |
          set -euo pipefail
          make test-integration 2>&1 | tee /tmp/integration-output.txt

      - name: Build step summary from annotations
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          python3 -m utils.annotations.summarize /tmp/integration-output.txt "Integration Test Annotation Summary"
