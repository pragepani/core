name: "🧹 Images: Cleanup CI (GHCR)"

on:
  schedule:
    - cron: "0 0 * * 6"
  workflow_dispatch:
    inputs:
      days:
        description: "Delete CI images older than N days (default: 7)"
        required: false
        default: "7"
        type: string

permissions:
  actions: read
  contents: read
  packages: write
  pull-requests: read

concurrency:
  group: images-cleanup-ci
  cancel-in-progress: false

jobs:
  cleanup:
    name: 🧹 Delete old ci-* image versions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Resolve image metadata
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "owner=$(scripts/meta/resolve/repository/owner.sh)"
            echo "repo_prefix=$(scripts/meta/resolve/repository/name.sh)"
            echo "distros=$(scripts/meta/resolve/distros.sh)"
          } >> "$GITHUB_OUTPUT"

      - name: 📦 Install jq
        shell: bash
        run: ./scripts/install/apt.sh jq

      - name: Cleanup old ci-* versions
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ steps.vars.outputs.owner }}
          DAYS: ${{ github.event.inputs.days || '7' }}
          REPO_PREFIX: ${{ steps.vars.outputs.repo_prefix }}
          INFINITO_DISTROS: ${{ steps.vars.outputs.distros }}
        run: |
          set -euo pipefail
          ./scripts/image/cleanup.sh
