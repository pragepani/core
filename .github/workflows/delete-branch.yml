name: "🚫 Cancel: Runs on Branch Delete"

on:
  delete:

# Enters the same concurrency group as entry-push-latest.yml for the deleted
# branch, which cancels that run and all its child workflow_call runs.
# NOTE: on `delete` events, `github.ref_name` resolves to the default branch
# (the workflow runs from the default branch context), not the deleted ref.
# Use `github.event.ref` to get the actually deleted branch name — otherwise
# this group would collide with the push-to-main CI and cancel it.
concurrency:
  group: global-ci-${{ github.repository }}-${{ github.event.ref }}
  cancel-in-progress: true

permissions:
  actions: write
  contents: read

jobs:
  # Fallback: cancel any remaining active runs via the GitHub API.
  cancel-branch-runs:
    if: ${{ github.event.ref_type == 'branch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Cancel active workflow runs for deleted branch
        shell: bash
        env:
          BRANCH: ${{ github.event.ref }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: bash scripts/github/cancel/deleted_branch_runs.sh
