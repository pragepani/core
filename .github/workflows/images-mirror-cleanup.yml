name: "🧹 Images: Cleanup GHCR (Private)"

on:
  workflow_dispatch:
    inputs:
      ghcr_namespace:
        description: "GHCR namespace/org (default: repository owner)"
        required: false
        type: string
        default: ""
      ghcr_prefix:
        description: "Package name prefix to delete (default: mirror)"
        required: false
        type: string
        default: "mirror"
      visibility:
        description: "Visibility filter: only packages with this visibility are deleted"
        required: false
        type: choice
        default: "private"
        options:
          - private
          - public
          - internal
      dry_run:
        description: "Dry-run: list packages that would be deleted without deleting them"
        required: false
        type: boolean
        default: true
      token:
        description: "Classic PAT with delete:packages scope. Leave empty to use the default GITHUB_TOKEN The default token may lack the delete:packages scope."
        required: false
        type: string
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  cleanup:
    name: 🗑️ Delete private GHCR mirror packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve GHCR namespace and repository
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          ghcr_namespace="${{ inputs.ghcr_namespace }}"
          if [[ -z "${ghcr_namespace}" ]]; then
            ghcr_namespace="$(scripts/meta/resolve/repository/owner.sh)"
          fi
          ghcr_repository="$(scripts/meta/resolve/repository/name.sh)"
          echo "ghcr_namespace=${ghcr_namespace,,}" >> "$GITHUB_OUTPUT"
          echo "ghcr_repository=${ghcr_repository}" >> "$GITHUB_OUTPUT"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Run mirror cleanup
        shell: bash
        env:
          GITHUB_TOKEN: ${{ inputs.token != '' && inputs.token || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          EXTRA_ARGS=()
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            EXTRA_ARGS+=( --dry-run )
          fi

          python -m cli.contributing.mirror.cleanup \
            --ghcr-namespace "${{ steps.vars.outputs.ghcr_namespace }}" \
            --ghcr-prefix    "${{ steps.vars.outputs.ghcr_repository }}/${{ inputs.ghcr_prefix }}" \
            --visibility     "${{ inputs.visibility }}" \
            "${EXTRA_ARGS[@]}"
