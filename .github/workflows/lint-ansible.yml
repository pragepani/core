name: "🔍 Lint: Ansible"

on:
  workflow_call:

permissions:
  contents: read
  packages: read

jobs:
  lint-ansible:
    name: 🧹 Lint Ansible
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      INFINITO_LINT_RUNNER: host

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install ansible-core + ansible-lint
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core ansible-lint pyyaml

      - name: Cache Ansible collections
        uses: actions/cache@v6
        with:
          path: ~/.ansible/collections
          key: ansible-collections-${{ runner.os }}-${{ hashFiles('requirements/requirements.galaxy.yml', 'requirements/requirements.git.yml') }}

      - name: Install required Ansible collections
        run: |
          ansible-galaxy collection install \
            -r requirements/requirements.galaxy.yml

      - name: Generate role include files
        # `tasks/groups/*-roles.yml` are generated artefacts (gitignored
        # via tasks/groups/.gitignore) referenced by `tasks/stages/*.yml`.
        # Without them ansible-lint reports a fatal load-failure on
        # `tasks/groups/desk-roles.yml`. Generate via the same script the
        # local `make setup` target uses; PyYAML is already on the runner
        # because we install it above. PYTHONPATH=. is set explicitly so
        # `cli/build/include/__main__.py` can import the repo-local
        # `utils.*` modules — locally the Makefile env layer
        # (scripts/meta/env/load.sh) does this, but here we invoke the
        # script directly without going through `make`.
        run: PYTHON=python3 PYTHONPATH=. bash scripts/setup.sh

      - name: Run lint-ansible via make
        run: make lint-ansible
