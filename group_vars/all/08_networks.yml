---
# Host-level network defaults + per-category port bands.
#
# This file retains ONLY the host-level keys and the PORT_BANDS map:
#
#   * NETWORK_IPV6_ENABLED            — global IPv6 toggle.
#   * defaults_networks.internet.*    — host-level addresses (ip4 / ip6 / dns).
#   * PORT_BANDS                      — per-<scope>.<category> port ranges read
#                                       at runtime by `cli meta ports suggest`
#                                       and by the host-bound port collision
#                                       lint. Extending PORT_BANDS is the
#                                       intended way to introduce a new
#                                       category (`metrics`, `grpc`, …) — the
#                                       suggester and lint pick it up
#                                       automatically with no second
#                                       registration step.
#
# What MOVED out of this file:
#
#   * defaults_networks.local.<role>.subnet  → roles/<role>/meta/server.yml
#                                               under networks.local.subnet
#   * defaults_networks.local.<role>.dns_resolver
#                                            → roles/<role>/meta/server.yml
#                                               under networks.local.dns_resolver
#   * group_vars/all/09_ports.yml (entire file, deleted)
#                                            → per-entity ports under
#                                               roles/<role>/meta/services.yml.<entity>.ports.{internal,local,public}
#
# See docs/contributing/design/role/services/layout.md for the full per-role meta
# layout.
NETWORK_IPV6_ENABLED: false
# Public DNS resolvers used wherever a role needs to look up external
# hostnames at runtime (nginx `resolver` directives in front-proxy
# vhosts, unbound `forward-addr` in the mail stack, etc.). Roles
# MUST template this list rather than hard-coding individual upstream
# IPs. The IPv6 toggle in any rendered nginx `resolver` directive
# comes from `NETWORK_IPV6_ENABLED` above.
NETWORK_PUBLIC_DNS_RESOLVERS:
  - 1.1.1.1 # nocheck: hardcoded-dns-resolver
  - 8.8.8.8 # nocheck: hardcoded-dns-resolver
  - 1.0.0.1 # nocheck: hardcoded-dns-resolver
# Docker's embedded DNS resolver. Used by per-app nginx gateways in
# their `resolver` directive to re-resolve sibling-container hostnames
# at request time instead of caching the upstream IP at startup, so a
# sibling restart that yields a new container IP doesn't strand the
# gateway on a dead address. Roles MUST template this constant rather
# than hard-coding `127.0.0.11`.
NETWORK_DOCKER_EMBEDDED_DNS_RESOLVER: "127.0.0.11" # nocheck: hardcoded-dns-resolver
# Ready-to-render nginx `resolver` directive for the docker embedded DNS,
# including the cache TTL and IPv6 toggle. Roles MUST emit this verbatim
# in their nginx templates instead of repeating the directive form, so
# the TTL and ipv6 stay consistent across the stack.
NETWORK_DOCKER_DNS_NGINX_DIRECTIVE: "resolver {{ NETWORK_DOCKER_EMBEDDED_DNS_RESOLVER }} valid=30s ipv6={{ NETWORK_IPV6_ENABLED | on_off }};"
defaults_networks:
  internet:
    ip4: "127.0.0.1"
    ip6: "::1"
    dns: ""
PORT_BANDS: # nocheck: unused-var  # consumed by the port-allocation plugin outside the YAML/Jinja scope
  local:
    http:
      start: 8001
      end: 8099
    websocket:
      start: 4001
      end: 4099
    oauth2:
      start: 16480
      end: 16519
    mariadb:
      start: 3306
      end: 3306
    postgres:
      start: 5432
      end: 5432
    ldap:
      start: 389
      end: 389
  public:
    ssh:
      start: 2201
      end: 2299
    stun_turn:
      start: 3478
      end: 3499
    stun_turn_tls:
      start: 5349
      end: 5399
    federation:
      start: 8448
      end: 8499
    ldaps:
      start: 636
      end: 636
    relay:
      start: 20000
      end: 65535
