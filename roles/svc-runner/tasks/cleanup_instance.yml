- name: Stop runner service for instance {{ runner_instance }}
  command: ./svc.sh stop
  args:
    chdir: "{{ runner_install_dir }}/{{ runner_instance }}"
  failed_when: false
  changed_when: false

- name: Uninstall runner service for instance {{ runner_instance }}
  command: ./svc.sh uninstall
  args:
    chdir: "{{ runner_install_dir }}/{{ runner_instance }}"
  failed_when: false
  changed_when: false

- name: Get GitHub Actions runner removal token for instance {{ runner_instance }}
  command: gh api repos/{{ runner_github_owner }}/{{ runner_github_repo }}/actions/runners/remove-token --method POST -q .token
  delegate_to: localhost
  register: runner_removal_token
  changed_when: true
  failed_when: false

- name: Deregister runner from GitHub for instance {{ runner_instance }}
  command: ./config.sh remove --token {{ runner_removal_token.stdout | trim }}
  args:
    chdir: "{{ runner_install_dir }}/{{ runner_instance }}"
  become: true
  become_user: "{{ runner_user }}"
  failed_when: false
  changed_when: true
  when: runner_removal_token.rc == 0 and (runner_removal_token.stdout | trim | length) > 0

- name: Find Docker containers for runner instance {{ runner_instance }}
  command: docker ps -aq --filter "label=com.docker.compose.project=runner-{{ runner_instance }}"
  register: _runner_containers
  changed_when: false
  failed_when: false

- name: Remove Docker containers for runner instance {{ runner_instance }}
  command: docker rm -f {{ _runner_containers.stdout | trim }}
  when: (_runner_containers.stdout | trim) | length > 0
  changed_when: true
  failed_when: false

- name: Remove runner instance directory {{ runner_instance }}
  file:
    path: "{{ runner_install_dir }}/{{ runner_instance }}"
    state: absent

- name: Unmount tmpfs from Docker volume directory for runner instance {{ runner_instance }}
  ansible.builtin.mount:
    path: "/mnt/docker/{{ runner_instance }}"
    state: unmounted
  failed_when: false
  changed_when: false

- name: Remove Docker volume directory for runner instance {{ runner_instance }}
  ansible.builtin.file:
    path: "/mnt/docker/{{ runner_instance }}"
    state: absent
