- name: Include distribution-specific package installation
  include_tasks: install/{{ runner_distribution }}.yml

- name: Install CI runner dependencies
  package:
    name:
      - jq
      - gettext-base
    state: present

- name: Tune kernel inotify limits for parallel systemd containers
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    reload: true
    sysctl_file: /etc/sysctl.d/99-github-runner.conf
  loop:
    - { key: fs.inotify.max_user_instances, value: "8192" }
    - { key: fs.inotify.max_user_watches, value: "524288" }
    - { key: fs.inotify.max_queued_events, value: "65536" }

- name: Create GitHub Actions runner system group
  group:
    name: "{{ runner_user }}"
    system: true

- name: Create GitHub Actions runner system user
  user:
    name: "{{ runner_user }}"
    group: "{{ runner_user }}"
    groups: docker
    append: true
    system: true
    shell: /usr/sbin/nologin
    home: "{{ runner_install_dir }}"
    create_home: true

- name: Grant passwordless sudo for CI cleanup operations
  copy:
    dest: /etc/sudoers.d/github-runner
    content: |
      github-runner ALL=(ALL) NOPASSWD: /usr/bin/chown -R * {{ runner_install_dir }}*, /bin/chown -R * {{ runner_install_dir }}*, /usr/bin/find {{ runner_install_dir }}*, /bin/find {{ runner_install_dir }}*, /bin/rm -rf {{ runner_install_dir }}*, /usr/bin/rm -rf {{ runner_install_dir }}*, /bin/rm -rf /mnt/docker*, /usr/bin/rm -rf /mnt/docker*, /bin/mkdir -vp /mnt/docker*, /usr/bin/mkdir -vp /mnt/docker*, /bin/mkdir -p /mnt/docker*, /usr/bin/mkdir -p /mnt/docker*, /bin/chown -R * /mnt/docker*, /usr/bin/chown -R * /mnt/docker*
    mode: '0440'
    validate: visudo -cf %s

- name: Create runner base directory
  file:
    path: "{{ runner_install_dir }}"
    state: directory
    owner: "{{ runner_user }}"
    group: "{{ runner_user }}"
    mode: '0755'

- name: Fetch latest GitHub Actions runner version tag
  command: gh api repos/actions/runner/releases/latest -q .tag_name
  delegate_to: localhost
  register: runner_version_tag
  changed_when: false

- name: Set resolved runner version
  set_fact:
    runner_resolved_version: "{{ runner_version_tag.stdout | trim | regex_replace('^v', '') }}"

- name: Download GitHub Actions runner binary
  get_url_retry:
    url: "https://github.com/actions/runner/releases/download/v{{ runner_resolved_version }}/actions-runner-linux-x64-{{ runner_resolved_version }}.tar.gz"
    dest: "{{ runner_install_dir }}/actions-runner.tar.gz"
    owner: "{{ runner_user }}"
    group: "{{ runner_user }}"
    mode: '0644'

- name: Provision runner instances
  include_tasks: instance.yml
  loop: "{{ range(1, runner_count | int + 1) | list }}"
  loop_control:
    loop_var: runner_instance
