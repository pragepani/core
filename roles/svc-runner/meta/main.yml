galaxy_info:
  author: Kevin Veen-Birkenbach
  description: Provisions a dedicated machine as a GitHub Actions self-hosted CI runner for Infinito.Nexus using ephemeral Docker containers.
  license: Infinito.Nexus Community License (Non-Commercial)
  min_ansible_version: "2.9"
  platforms:
    - name: ArchLinux
      versions:
        - all
    - name: Debian
      versions:
        - all
    - name: EL
      versions:
        - all
    - name: Fedora
      versions:
        - all
    - name: Ubuntu
      versions:
        - all
  galaxy_tags:
    - ci
    - runner
    - github
    - docker
    - automation
  issue_tracker_url: https://s.infinito.nexus/issues
dependencies:
  - sys-svc-container
