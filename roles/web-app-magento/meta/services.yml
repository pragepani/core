---
logout:
  enabled: "{{ 'web-svc-logout' in group_names }}"
  shared: "{{ 'web-svc-logout' in group_names }}"
# nocheck: dynamic-flag
# nocheck: oidc
sso:
  enabled: "{{ 'web-app-keycloak' in group_names }}"
  shared: "{{ 'web-app-keycloak' in group_names }}"
  flavor: oauth2
  oauth2:
    origin:
      host: nginx
      port: "8080"
dashboard:
  enabled: "{{ 'web-app-dashboard' in group_names }}"
  shared: "{{ 'web-app-dashboard' in group_names }}"
matomo:
  enabled: "{{ 'web-app-matomo' in group_names }}"
  shared: "{{ 'web-app-matomo' in group_names }}"
email:
  enabled: "{{ 'web-app-mailu' in group_names }}"
  shared: "{{ 'web-app-mailu' in group_names }}"
php:
  image: markoshust/magento-php
  version: 8.5-fpm
  name: magento-php
  backup:
    no_stop_required: true
  min_storage: 5GB
  cpus: "0.5"
  mem_reservation: 256m
  mem_limit: 1g
  pids_limit: 512
nginx:
  image: markoshust/magento-nginx
  version: latest
  name: magento-nginx
  backup:
    no_stop_required: true
  min_storage: 5GB
  cpus: "0.5"
  mem_reservation: 256m
  mem_limit: 1g
  pids_limit: 512
# nocheck: dynamic-flag
mariadb:
  shared: false
  enabled: true
  version: "11.4"
# nocheck: shared
# nocheck: dynamic-flag
redis:
  backup:
    disabled: true
  enabled: true
# nocheck: shared
# nocheck: dynamic-flag
search:
  enabled: true
  image: opensearchproject/opensearch
  version: latest
  name: magento-opensearch
  min_storage: 10GB
  cpus: "1.0"
  mem_reservation: 1g
  mem_limit: 2g
  pids_limit: 1024
css:
  enabled: "{{ 'web-svc-css' in group_names }}"
  shared: "{{ 'web-svc-css' in group_names }}"
prometheus:
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
magento:
  ports:
    local:
      sso: 16504
      http: 8052
  run_after:
    - web-app-keycloak
  lifecycle: unsupported
  min_storage: 10GB
  cpus: "1.0"
  mem_reservation: 1g
  mem_limit: 2g
  pids_limit: 1024
