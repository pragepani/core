---
# Matrix-deploy variant overrides for this role. The SSO variant rides the
# `web-app-keycloak` SSO-proxy sidecar (flavor: oauth2) in front of Baserow.

# variant 0: OIDC variant (canonical default).

- services:
    dashboard:
      enabled: true
      shared: true
    email:
      enabled: true
      shared: true
    logout:
      enabled: true
      shared: true
    matomo:
      enabled: true
      shared: true
    sso:
      enabled: true
      shared: true
    postgres:
      shared: true
    prometheus:
      enabled: true
      shared: true
    seaweedfs:
      enabled: true
      shared: true
    css:
      enabled: true
      shared: true
- services:
    dashboard:
      enabled: false
      shared: false
    email:
      enabled: false
      shared: false
    logout:
      enabled: false
      shared: false
    matomo:
      enabled: false
      shared: false
    sso:
      enabled: false
      shared: false
    postgres:
      shared: false
    prometheus:
      enabled: false
      shared: false
    seaweedfs:
      enabled: false
      shared: false
    css:
      enabled: false
      shared: false
