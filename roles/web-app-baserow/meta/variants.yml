---
# Matrix-deploy variant overrides for this role. Both auth-flow variants ride the same
# `web-app-oauth2-proxy` sidecar in front of the Baserow web UI.

# variant 0: OIDC variant (canonical default).

- services:
    dashboard:
      enabled: true
      shared: true
    email:
      enabled: true
      shared: true
    logout:
      enabled: true
      shared: true
    matomo:
      enabled: true
      shared: true
    oauth2:
      enabled: true
      shared: true
    postgres:
      shared: true
    prometheus:
      enabled: true
      shared: true
    ldap:
      enabled: true
      shared: true
    css:
      enabled: true
      shared: true
- services:
    dashboard:
      enabled: false
      shared: false
    email:
      enabled: false
      shared: false
    logout:
      enabled: false
      shared: false
    matomo:
      enabled: false
      shared: false
    oauth2:
      enabled: false
      shared: false
    postgres:
      shared: false
    prometheus:
      enabled: false
      shared: false
    ldap:
      enabled: false
      shared: false
    css:
      enabled: false
      shared: false
- services:
    ldap:
      enabled: true
      shared: true
    oauth2:
      enabled: false
      shared: false
    css:
      enabled: false
      shared: false
    dashboard:
      enabled: false
      shared: false
    email:
      enabled: false
      shared: false
    logout:
      enabled: false
      shared: false
    matomo:
      enabled: false
      shared: false
    postgres:
      enabled: false  # nocheck: variants-static-override
      shared: false
    prometheus:
      enabled: false
      shared: false
