---
credentials:
  postgres_password:
    description: "Password for the Zammad PostgreSQL user (used against the central svc-db-postgres or any provider compatible with it)."
    algorithm: alphanumeric
    validation: "^[A-Za-z0-9]{16,}$"
    length: 32
  secret_key_base:
    description: "Rails `secret_key_base` for Zammad (sessions, encrypted cookies). Stable across deploys to avoid invalidating sessions."
    algorithm: alphanumeric
    validation: "^[A-Za-z0-9]{64,}$"
    length: 128
  initial_admin_password:
    description: "Password seeded into Zammad on first start for the bootstrap administrator account. Used once to bypass the setup wizard."
    algorithm: alphanumeric
    validation: "^[A-Za-z0-9]{16,}$"
    length: 32
  api_token:
    description: "Long-lived Zammad API token created during bootstrap; used by tasks/main.yml for post-start configuration (OIDC settings, inbound channel, group
      mapping)."
    algorithm: alphanumeric
    validation: "^[A-Za-z0-9]{32,}$"
    length: 64
