---
logout:
  enabled: "{{ 'web-svc-logout' in group_names }}"
  shared: "{{ 'web-svc-logout' in group_names }}"
dashboard:
  enabled: "{{ 'web-app-dashboard' in group_names }}"
  shared: "{{ 'web-app-dashboard' in group_names }}"
matomo:
  enabled: "{{ 'web-app-matomo' in group_names }}"
  shared: "{{ 'web-app-matomo' in group_names }}"
email:
  enabled: "{{ 'web-app-mailu' in group_names }}"
  shared: "{{ 'web-app-mailu' in group_names }}"
ldap:
  enabled: "{{ 'svc-db-openldap' in group_names }}"
  shared: "{{ 'svc-db-openldap' in group_names }}"
sso:
  enabled: "{{ 'web-app-keycloak' in group_names }}"
  shared: "{{ 'web-app-keycloak' in group_names }}"
  flavor: oauth2
  oauth2:
    origin:
      host: bluesky-broker
      port: 8080
    allowed_groups:
      - "{{ lookup('rbac_group_path', application_id='web-app-bluesky', role='administrator') }}"
    # nocheck: shared
    # nocheck: dynamic-flag
    # nocheck: playwright-service-flag — internal sub-component (multi-entity role)
    acl:
      whitelist:
        - /xrpc/
        - /.well-known/
        - /robots.txt
# nocheck: shared
# nocheck: dynamic-flag
# nocheck: playwright-service-flag — internal sub-component (multi-entity role)
web:
  enabled: true
  ports:
    local:
      http: 8031
      sso: 16496
  min_storage: 5GB
  cpus: "0.5"
  mem_reservation: 256m
  mem_limit: 1g
  pids_limit: 512
# nocheck: dynamic-flag
# nocheck: playwright-service-flag — internal sub-component (multi-entity role)
view:
  enabled: false
  repository: https://github.com/bluesky-social/social-app.git
  ref: "1.122.0"
  ports:
    local:
      http: 8051
  min_storage: 1GB
  cpus: "0.2"
  mem_reservation: 128m
  mem_limit: 256m
  pids_limit: 256
pds:
  image: ghcr.io/bluesky-social/pds
  version: latest
  min_storage: 10GB
  cpus: "1.0"
  mem_reservation: 1g
  mem_limit: 2g
  pids_limit: 1024
broker:
  # Login-broker sidecar that owns the OIDC → PDS app-password
  # handoff and the AES-256-GCM-encrypted user attribute. The image
  # is built from `files/login-broker/`.
  name: bluesky-broker
  image: bluesky-broker
  port: 8080
  ports:
    local:
      http: 8076
  min_storage: 1GB
  cpus: "0.2"
  mem_reservation: 128m
  mem_limit: 256m
  pids_limit: 256
# nocheck: playwright-service-flag — css consumer, no Playwright surface (provider: web-svc-css)
css:
  enabled: "{{ 'web-svc-css' in group_names }}"
  shared: "{{ 'web-svc-css' in group_names }}"
prometheus:
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
api:
  ports:
    local:
      http: 8030
  min_storage: 5GB
  cpus: "0.5"
  mem_reservation: 256m
  mem_limit: 1g
  pids_limit: 512
bluesky:
  ports:
    local:
      # oauth2-proxy listens here; the front-proxy routes the gated
      # default `/` path through this port. Picked so it doesn't
      # collide with the existing api/web/view bindings above.
      sso: 16497
  run_after:
    - web-app-matomo
    - web-app-keycloak
    - web-app-mailu
  lifecycle: beta
  min_storage: 1GB
  cpus: "0.5"
  mem_reservation: 256m
  mem_limit: 1g
  pids_limit: 512
