---
- name: "load docker and db for {{ application_id }}"
  include_role:
    name: sys-stk-backend
  vars:
    compose_handlers_flush: false

- name: include 02_create-and-seed-database.yml for multiple bridges
  include_tasks: 02_create-and-seed-database.yml
  vars:
    database_password: "{{ item.database_password }}"
    database_username: "{{ item.database_username }}"
    database_name: "{{ item.database_name }}"
  loop: "{{ MATRIX_BRIDGES }}"

- name: "cleanup project folder"
  file:
    path: "{{ lookup('container', application_id, 'directories.instance') }}mautrix/"
    state: absent

- name: "create bridge folders"
  file:
    path: "{{ lookup('container', application_id, 'directories.instance') }}mautrix/{{ item.bridge_name }}"
    state: directory
    mode: "0755"
  loop: "{{ MATRIX_BRIDGES }}"

- name: "Pre-create empty registration files so docker bind-mounts them as files (synapse may start before the bridge writes them)"
  copy:
    content: ""
    dest: "{{ lookup('container', application_id, 'directories.instance') }}mautrix/{{ item.bridge_name }}/registration.yaml"
    mode: "0666"
    force: false
  loop: "{{ MATRIX_BRIDGES }}"

- name: add multiple mautrix bridge configuration
  template:
    src: "flavor/compose/mautrix/{{ item.bridge_name }}.config.yml.j2"
    dest: "{{ lookup('container', application_id, 'directories.instance') }}mautrix/{{ item.bridge_name }}/config.yaml"
  loop: "{{ MATRIX_BRIDGES }}"
  notify: compose up

- name: add element configuration
  template:
    src: "flavor/compose/element.config.json.j2"
    dest: "{{ MATRIX_ELEMENT_CONFIG_PATH_HOST }}"
  notify: compose up

- name: add synapse homeserver configuration
  template:
    src: "flavor/compose/synapse/homeserver.yaml.j2"
    dest: "{{ MATRIX_SYNAPSE_CONFIG_PATH_HOST }}"
  notify: compose up

- name: add synapse log configuration
  template:
    src: "flavor/compose/synapse/log.config.j2"
    dest: "{{ MATRIX_SYNAPSE_LOG_PATH_HOST }}"
  notify: compose up

- name: set correct folder permissions
  command:
    cmd: "container run --rm --mount type=volume,src={{ MATRIX_SYNAPSE_VOLUME }},dst=/data -e SYNAPSE_SERVER_NAME={{ MATRIX_SYNAPSE_DOMAIN }} -e SYNAPSE_REPORT_STATS=no
      --entrypoint /bin/sh matrixdotorg/synapse:latest -c 'chown -vR 991:991 /data'"

- name: Flush handlers
  meta: flush_handlers

- name: wait for registration files
  wait_for:
    path: "{{ lookup('container', application_id, 'directories.instance') }}mautrix/{{ item.bridge_name }}/registration.yaml"
    search_regex: "as_token"
    timeout: 180
  loop: "{{ MATRIX_BRIDGES }}"

- name: "change file permissions"
  file:
    path: "{{ lookup('container', application_id, 'directories.instance') }}mautrix/{{ item.bridge_name }}/registration.yaml"
    mode: "0755"
  loop: "{{ MATRIX_BRIDGES }}"
  async: "{{ ASYNC_TIME if ASYNC_ENABLED | bool else omit }}"
  poll: "{{ ASYNC_POLL if ASYNC_ENABLED | bool else omit }}"

- name: "Restart synapse so it loads the freshly generated bridge appservice registrations"
  command:
    cmd: "{{ BIN_COMPOSE }} restart synapse"
    chdir: "{{ lookup('container', application_id, 'directories.instance') }}"
  changed_when: true
  when: MATRIX_BRIDGES | length > 0

- name: wait for Synapse client/versions endpoint
  uri_retry:
    url: "http://127.0.0.1:{{ lookup('config', application_id, 'services.synapse.ports.local.http') }}/_matrix/client/versions"
    method: GET
    status_code: 200
  register: matrix_synapse_health
  retries: 60
  delay: 2
  until: matrix_synapse_health.status == 200

- name: create admin account
  command:
    cmd: "{{ BIN_COMPOSE }} exec -T synapse register_new_matrix_user -u {{ MATRIX_ADMINISTRATOR_USERNAME | quote }} -p {{ MATRIX_ADMINISTRATOR_PASSWORD | quote }}
      -a -c {{ MATRIX_SYNAPSE_CONFIG_PATH_CONTAINER | quote }} http://localhost:{{ MATRIX_SYNAPSE_CONTAINER_PORT }}"
    chdir: "{{ lookup('container', application_id, 'directories.instance') }}"
  register: matrix_create_admin
  changed_when: matrix_create_admin.rc == 0
  failed_when: >
    matrix_create_admin.rc != 0 and
    'User ID already taken' not in (matrix_create_admin.stdout + matrix_create_admin.stderr)
  no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"

- name: create chatgpt bot
  command:
    cmd: "{{ BIN_COMPOSE }} exec -T synapse register_new_matrix_user -u chatgptbot -p {{ lookup('config', application_id, 'credentials.chatgpt_bridge_user_password')
      | quote }} -a -c {{ MATRIX_SYNAPSE_CONFIG_PATH_CONTAINER | quote }} http://localhost:{{ MATRIX_SYNAPSE_CONTAINER_PORT }}"
    chdir: "{{ lookup('container', application_id, 'directories.instance') }}"
  register: matrix_create_chatgptbot
  changed_when: matrix_create_chatgptbot.rc == 0
  failed_when: >
    matrix_create_chatgptbot.rc != 0 and
    'User ID already taken' not in (matrix_create_chatgptbot.stdout + matrix_create_chatgptbot.stderr)
  no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"
