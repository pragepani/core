---
- name: Build enabled bridge list from meta/addons/
  set_fact:
    MATRIX_BRIDGES: >-
      {{ lookup('config', application_id, 'addons')
         | dict2items
         | selectattr('value.mechanism', 'equalto', 'bridge')
         | selectattr('value.enabled', 'equalto', true)
         | map(attribute='value.config')
         | list }}
  changed_when: false

- name: "compose-flavor: docker stack for '{{ application_id }}'"
  include_tasks: 01_docker.yml

- name: "compose-flavor: webserver for '{{ application_id }}'"
  include_tasks: 03_webserver.yml
