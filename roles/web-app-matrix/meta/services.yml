---
sso:
  bond: 1
  enabled: "{{ 'web-app-keycloak' in group_names }}"
  shared: "{{ 'web-app-keycloak' in group_names }}"
  flavor: oidc
ldap:
  bond: 1
  enabled: "{{ 'svc-db-openldap' in group_names }}"
  shared: "{{ 'svc-db-openldap' in group_names }}"
logout:
  bond: 1
  enabled: "{{ 'web-svc-logout' in group_names }}"
  shared: "{{ 'web-svc-logout' in group_names }}"
dashboard:
  bond: 1
  enabled: "{{ 'web-app-dashboard' in group_names }}"
  shared: "{{ 'web-app-dashboard' in group_names }}"
matomo:
  bond: 1
  enabled: "{{ 'web-app-matomo' in group_names }}"
  shared: "{{ 'web-app-matomo' in group_names }}"
email:
  bond: 1
  enabled: "{{ 'web-app-mailu' in group_names }}"
  shared: "{{ 'web-app-mailu' in group_names }}"
# nocheck: playwright-service-flag — TURN/STUN server, no Playwright surface (provider: web-svc-coturn)
coturn:
  bond: 1
  enabled: "{{ 'web-svc-coturn' in group_names }}"
  shared: "{{ 'web-svc-coturn' in group_names }}"
# nocheck: playwright-service-flag — DB engine, covered by role-local integration tests
postgres:
  bond: 1
  enabled: true # nocheck: dynamic-flag — matrix always needs a database
  shared: "{{ 'svc-db-postgres' in group_names }}"
synapse:
  version: latest
  image: matrixdotorg/synapse
  name: matrix-synapse
  backup:
    no_stop_required: true
  ports:
    internal:
      http: 8008
    local:
      http: 8021
    public:
      federation: 8448
  min_storage: 10GB
  cpus: "1.5"
  mem_reservation: "1g"
  mem_limit: "2g"
  pids_limit: 2048
element:
  version: latest
  image: vectorim/element-web
  name: matrix-element
  ports:
    local:
      http: 8022
  min_storage: 1GB
  cpus: "0.2"
  mem_reservation: 128m
  mem_limit: 256m
  pids_limit: 256
matrix-chatgpt-bot:
  version: latest
  image: ghcr.io/matrixgpt/matrix-chatgpt-bot
  min_storage: 1GB
  cpus: "0.2"
  mem_reservation: 128m
  mem_limit: 256m
  pids_limit: 256
# nocheck: playwright-service-flag — object store, no Playwright surface (provider: web-app-seaweedfs)
seaweedfs:
  bond: 1
  enabled: "{{ 'web-app-seaweedfs' in group_names }}"
  shared: "{{ 'web-app-seaweedfs' in group_names }}"
  public: true
# nocheck: playwright-service-flag — css consumer, no Playwright surface (provider: web-svc-css)
css:
  bond: 1
  enabled: "{{ 'web-svc-css' in group_names }}"
  shared: "{{ 'web-svc-css' in group_names }}"
prometheus:
  bond: 1
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
  native_metrics:
    enabled: true
    port: 9000
    service_key: synapse
  communication:
    channel: true
# nocheck: playwright-service-flag: shared provider entity; the app itself is covered by this role's own Playwright spec
matrix:
  bond: 1
  enabled: true
  shared: true
  flavor: ansible
  upstream:
    repo: https://github.com/spantaleev/matrix-docker-ansible-deploy
    ref: master
    migration_validated_version: v2026.05.18.0
  runner:
    image: infinito/web-app-matrix-mdad-runner:1
    base_image: python
    base_version: 3.13-slim
    docker_cli_image: docker
    docker_cli_version: 28.0.4-cli
  playbook_tags: setup-all,start
  server_name: "{{ DOMAIN_PRIMARY }}"
  plugins:
    appservice_irc: false
    chatgpt: false
    discord: false
    gitter: false
    heisenbridge: true
    hookshot: false
    mautrix_discord: false
    mautrix_signal: false
    mautrix_slack: false
    mautrix_telegram: false
    mautrix_twitter: false
    mautrix_whatsapp: false
  conferencing:
    element_call: true
    jitsi: true
  run_after:
    - web-app-matomo
    - web-app-keycloak
    - web-app-mailu
  lifecycle: beta
  min_storage: "1GB"
  cpus: "0.5"
  mem_reservation: "128m"
  mem_limit: "512m"
  pids_limit: 256
