---
# General
application_id: "web-app-minio"

# MINIO
# https://www.min.io/
MINIO_VERSION: "{{ lookup('config', application_id, 'services.minio.version') }}"
MINIO_IMAGE: "{{ lookup('config', application_id, 'services.minio.image') }}"
MINIO_CONTAINER: "{{ lookup('config', application_id, 'services.minio.name') }}"
MINIO_VOLUME: "{{ lookup('config', application_id, 'volumes.data') }}"

## Api
MINIO_API_DOMAIN: "{{ lookup('config', application_id, 'server.domains.canonical.api') }}"
MINIO_API_URL: "{{ lookup('tls', application_id, 'protocols.web') }}://{{ MINIO_API_DOMAIN }}"
MINIO_API_PORT_INTERNAL: "{{ lookup('config', application_id, 'services.minio.api_port') }}"
MINIO_API_PORT_PUBLIC: "{{ lookup('config', application_id, 'services.api.ports.local.http') }}"

## Console
MINIO_CONSOLE_DOMAIN: "{{ lookup('config', application_id, 'server.domains.canonical.console') }}"
MINIO_CONSOLE_URL: "{{ lookup('tls', application_id, 'url.base') }}"
MINIO_CONSOLE_PORT_INTERNAL: 9001
MINIO_CONSOLE_PORT_PUBLIC: "{{ lookup('config', application_id, 'services.console.ports.local.http') }}"

## MC
# mc is invoked via `mc alias set` with explicit credential args, NOT via
# `MC_HOST_<alias>=https://USER:PASS@host`. Reason: mc does not URL-decode
# credentials read from the env-var URL form, while MinIO server stores the
# decoded password, which mismatches sigv4 for any password that contains
# URL-reserved characters.
MINIO_MC_IMAGE: "{{ lookup('minio', application_id, 'mc_image') }}"

## OIDC
MINIO_OIDC_ENABLED: "{{ lookup('config', application_id, 'services.sso.enabled') }}"
MINIO_OIDC_POLICY_NAME: "{{ lookup('rbac_group_path', application_id=application_id, role='administrator') }}"
MINIO_OIDC_POLICY_CONTENT: "{{ lookup('template', 'policy.json.j2') }}"

## LDAP
MINIO_LDAP_ENABLED: "{{ lookup('config', application_id, 'services.ldap.enabled') }}"

MINIO_FRONT_PROXY_MATRIX: >-
  {{
    [
      { 'domain': MINIO_CONSOLE_DOMAIN, 'http_port': MINIO_CONSOLE_PORT_PUBLIC },
      { 'domain': MINIO_API_DOMAIN,     'http_port': MINIO_API_PORT_PUBLIC }
    ]
  }}
