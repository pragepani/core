---
# Matrix-deploy variant overrides for web-app-kix.
# See docs/contributing/artefact/files/role/variants.md for the file format.

# variant pinning every dynamic services.yml flag to true so the
# matrix exercises the in-group_names branch of web-app-kix.
- services:
    css:
      enabled: true
      shared: true
    dashboard:
      enabled: true
      shared: true
    email:
      enabled: true
      shared: true
    ldap:
      shared: true
      enabled: true
    logout:
      enabled: true
      shared: true
    matomo:
      enabled: true
      shared: true
    oauth2:
      enabled: true
      shared: true
    prometheus:
      enabled: true
      shared: true
- services:
    css:
      enabled: false
      shared: false
    dashboard:
      enabled: false
      shared: false
    email:
      enabled: false
      shared: false
    ldap:
      shared: false
      enabled: false
    logout:
      enabled: false
      shared: false
    matomo:
      enabled: false
      shared: false
    oauth2:
      enabled: false
      shared: false
    prometheus:
      enabled: false
      shared: false
- services:
    ldap:
      enabled: true
      shared: true
    oauth2:
      enabled: false
      shared: false
    css:
      enabled: false
      shared: false
    dashboard:
      enabled: false
      shared: false
    email:
      enabled: false
      shared: false
    logout:
      enabled: false
      shared: false
    matomo:
      enabled: false
      shared: false
    prometheus:
      enabled: false
      shared: false
