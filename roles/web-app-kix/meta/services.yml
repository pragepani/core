---
logout:
  enabled: "{{ 'web-svc-logout' in group_names }}"
  shared: "{{ 'web-svc-logout' in group_names }}"
dashboard:
  enabled: "{{ 'web-app-dashboard' in group_names }}"
  shared: "{{ 'web-app-dashboard' in group_names }}"
matomo:
  enabled: "{{ 'web-app-matomo' in group_names }}"
  shared: "{{ 'web-app-matomo' in group_names }}"
email:
  enabled: "{{ 'web-app-mailu' in group_names }}"
  shared: "{{ 'web-app-mailu' in group_names }}"
ldap:
  enabled: "{{ 'svc-db-openldap' in group_names }}"
  shared: "{{ 'svc-db-openldap' in group_names }}"
sso:
  enabled: "{{ 'web-app-keycloak' in group_names }}"
  shared: "{{ 'web-app-keycloak' in group_names }}"
  flavor: oauth2
  oauth2:
    origin:
      host: kix-proxy
      port: "80"
    allowed_groups:
      - "roles/web-app-kix/administrator"
      - "roles/web-app-kix/user"
# nocheck: playwright-service-flag — verified by web-svc-css provider spec
css:
  enabled: "{{ 'web-svc-css' in group_names }}"
  shared: "{{ 'web-svc-css' in group_names }}"
prometheus:
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
# nocheck: dynamic-flag
# nocheck: playwright-service-flag — DB engine, covered by role-local integration tests
redis:
  enabled: true
  shared: true
kix:
  image: docker-registry.kixdesk.com/public/proxy
  version: stable
  min_storage: 10GB
  ports:
    local:
      http: 8083
      sso: 16500
  run_after:
    - web-app-keycloak
  lifecycle: beta
  cpus: "0.5"
  mem_reservation: 512m
  mem_limit: 1g
  pids_limit: 512
backend:
  image: docker-registry.kixdesk.com/public/backend
  version: stable
  min_storage: 5GB
  cpus: "1.5"
  mem_reservation: 2g
  mem_limit: 4g
  pids_limit: 1024
frontend:
  image: docker-registry.kixdesk.com/public/frontend
  version: stable
  min_storage: 2GB
  cpus: "0.5"
  mem_reservation: 512m
  mem_limit: 1g
  pids_limit: 512
db:
  image: docker-registry.kixdesk.com/public/db
  version: stable
  min_storage: 5GB
  cpus: "0.5"
  mem_reservation: 1g
  mem_limit: 2g
  pids_limit: 512
