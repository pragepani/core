---
# Matrix-deploy variant overrides for web-app-xwiki.
# See docs/contributing/artefact/files/role/variants.md for the file format.

# variant pinning every dynamic services.yml flag to true so the
# matrix exercises the in-group_names branch of web-app-xwiki.
- services:
    dashboard:
      enabled: true
      shared: true
    email:
      enabled: true
      shared: true
    logout:
      enabled: true
      shared: true
    matomo:
      enabled: true
      shared: true
    sso:
      enabled: true
      shared: true
    postgres:
      shared: true
    prometheus:
      enabled: true
      shared: true
    css:
      enabled: true
      shared: true
- services:
    dashboard:
      enabled: false
      shared: false
    email:
      enabled: false
      shared: false
    logout:
      enabled: false
      shared: false
    matomo:
      enabled: false
      shared: false
    sso:
      enabled: false
      shared: false
    postgres:
      shared: false
    prometheus:
      enabled: false
      shared: false
    css:
      enabled: false
      shared: false
# LDAP-only auth backend: exercises the ldap-authenticator addon's enabled
# branch. OIDC stays off because the two auth backends are mutually exclusive
# (tasks/02_validation.yml); the ldap service block is a static-false opt-in by
# design (auto-enabling it would collide with sso when both partners deploy),
# so the on-override is a sanctioned static override.
- services:
    sso:
      enabled: false
      shared: false
    ldap:
      enabled: true # nocheck: variants-static-override
      shared: true # nocheck: variants-static-override
    dashboard:
      enabled: false
      shared: false
    email:
      enabled: false
      shared: false
    logout:
      enabled: false
      shared: false
    matomo:
      enabled: false
      shared: false
    postgres:
      shared: true
    prometheus:
      enabled: false
      shared: false
    css:
      enabled: false
      shared: false
