---
sso:
  enabled: "{{ 'web-app-keycloak' in group_names }}"
  shared: "{{ 'web-app-keycloak' in group_names }}"
  flavor: oidc
logout:
  enabled: "{{ 'web-svc-logout' in group_names }}"
  shared: "{{ 'web-svc-logout' in group_names }}"
# nocheck: dynamic-flag
ldap:
  enabled: false
  shared: false
  trylocal: true
dashboard:
  enabled: "{{ 'web-app-dashboard' in group_names }}"
  shared: "{{ 'web-app-dashboard' in group_names }}"
matomo:
  enabled: "{{ 'web-app-matomo' in group_names }}"
  shared: "{{ 'web-app-matomo' in group_names }}"
email:
  enabled: "{{ 'web-app-mailu' in group_names }}"
  shared: "{{ 'web-app-mailu' in group_names }}"
# nocheck: dynamic-flag
redis:
  enabled: false
  backup:
    disabled: true
postgres:
  enabled: true # nocheck: dynamic-flag
  shared: "{{ 'svc-db-postgres' in group_names }}"
xwiki:
  image: xwiki
  version: lts-postgres-tomcat
  name: xwiki
  min_storage: 10GB
  backup:
    no_stop_required: true
  cpus: 1.0
  mem_reservation: 1g
  mem_limit: 2g
  pids_limit: 1024
  plugins:
    oidc:
      enabled: true
      shared: true
      items:
        - id: org.xwiki.contrib.oidc:oidc-authenticator
          version: 2.19.6
    ldap:
      enabled: false
      items:
        - id: org.xwiki.contrib.ldap:ldap-authenticator
          version: 9.15.7
    matomo:
      enabled: false
      items:
        - id: org.xwiki.contrib:matomo
          version: "1.0"
  ports:
    local:
      http: 8054
  run_after:
    - web-app-matomo
    - web-app-keycloak
    - web-app-mailu
  lifecycle: beta
css:
  enabled: "{{ 'web-svc-css' in group_names }}"
  shared: "{{ 'web-svc-css' in group_names }}"
prometheus:
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
