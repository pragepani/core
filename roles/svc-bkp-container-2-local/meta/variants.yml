---
# Matrix-deploy variant overrides for svc-bkp-container-2-local.
# See docs/contributing/artefact/files/role/variants.md for the file format.
#
# Each variant pins a different companion topology via service-key flags
# that the CombinedResolver translates into provider role includes (per
# `utils.roles.applications.services.registry`). The matrix wrapper then
# deploys the resulting closure for each round, so apps outside the
# closure are not in scope (and any group-name-gated flags they carry
# do not fire because they are not in the inventory at all).

# Variant 0: one mariadb-backed app (web-app-gitea, primary entity
# `gitea`) + one postgres-backed app (web-app-keycloak, primary entity
# `keycloak`). Exercises the full per-app database seed + dump path
# against two distinct engines at once.
- services:
    gitea: # nocheck: variants-services-match
      enabled: true
      shared: true
    keycloak: # nocheck: variants-services-match
      enabled: true
      shared: true

# Variant 1: raw relational DB engines only (no app consumer on top).
# Exercises the engine-side dump path without per-app
# `04_seed-database-to-backup` entries, so the role must still produce
# a valid (possibly empty) backup tree.
- services:
    postgres: # nocheck: variants-services-match
      enabled: true
      shared: true
    mariadb: # nocheck: variants-services-match
      enabled: true
      shared: true

# Variant 2: directory engine only (svc-db-openldap, registered under
# service-key `ldap` via its `provides: ldap` declaration). Exercises
# the non-relational backup path: the consumer-seed mechanism is not
# applicable here, so the run must capture the directory's payload
# without any SQL handler being involved.
- services:
    ldap: # nocheck: variants-services-match
      enabled: true
      shared: true
    gitea: # nocheck: variants-services-match
      enabled: false
      shared: false
    keycloak: # nocheck: variants-services-match
      enabled: false
      shared: false
    mariadb: # nocheck: variants-services-match
      enabled: false
      shared: false
    postgres: # nocheck: variants-services-match
      enabled: false
      shared: false
