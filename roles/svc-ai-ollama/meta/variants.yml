---
# Matrix-deploy variant overrides for this role. Each list entry is
# one variant deep-merged on top of `meta/services.yml`. The development
# deploy wrapper iterates the global round count (max variants across
# all primary apps) and runs cleanup between rounds for any app whose
# variant changed. Apps with fewer variants stay on variant 0 in the
# extra rounds.
# See docs/contributing/artefact/files/role/variants.md for the file format.

- services:
    ollama:
      preload_models:
        - smollm2:135m
