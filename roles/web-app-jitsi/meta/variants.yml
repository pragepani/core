---
# Matrix-deploy variant overrides for web-app-jitsi.
# See docs/contributing/artefact/files/role/variants.md for the file format.

# V1: oidc + ldap + everything that can be true, is true
- services:
    css:
      enabled: true
      shared: true
    dashboard:
      enabled: true
      shared: true
    email:
      enabled: true
      shared: true
    ldap:
      enabled: true
      shared: true
    logout:
      enabled: true
      shared: true
    matomo:
      enabled: true
      shared: true
    sso:
      enabled: true
      shared: true
    prometheus:
      enabled: true
      shared: true

# V2: no auth — everything off, AUTH_TYPE=internal, anonymous rooms
- services:
    css:
      enabled: false
      shared: false
    dashboard:
      enabled: false
      shared: false
    email:
      enabled: false
      shared: false
    ldap:
      enabled: false
      shared: false
    logout:
      enabled: false
      shared: false
    matomo:
      enabled: false
      shared: false
    sso:
      enabled: false
      shared: false
    prometheus:
      enabled: false
      shared: false

# V3: ldap only — direct prosody mod_auth_ldap2 against svc-db-openldap
- services:
    css:
      enabled: false
      shared: false
    dashboard:
      enabled: false
      shared: false
    email:
      enabled: false
      shared: false
    ldap:
      enabled: true
      shared: true
    logout:
      enabled: false
      shared: false
    matomo:
      enabled: false
      shared: false
    sso:
      enabled: false
      shared: false
    prometheus:
      enabled: false
      shared: false
