---
# nocheck: dynamic-flag
# nocheck: logout
logout:
  enabled: false
  shared: false
# nocheck: dynamic-flag
dashboard:
  enabled: true
  shared: true
# nocheck: dynamic-flag
matomo:
  enabled: true
  shared: true
# nocheck: playwright-service-flag — css consumer, no Playwright surface (provider: web-svc-css)
css:
  enabled: "{{ 'web-svc-css' in group_names }}"
  shared: "{{ 'web-svc-css' in group_names }}"
# nocheck: dynamic-flag
# nocheck: email
email:
  enabled: false
  shared: false
# nocheck: dynamic-flag
# nocheck: oidc
# nocheck: sso
sso:
  enabled: false
  shared: false
# nocheck: dynamic-flag
prometheus:
  enabled: true
  shared: true
mastodon:
  enabled: "{{ 'web-app-mastodon' in group_names }}"
  shared: "{{ 'web-app-mastodon' in group_names }}"
friendica:
  enabled: "{{ 'web-app-friendica' in group_names }}"
  shared: "{{ 'web-app-friendica' in group_names }}"
fediwall:
  image: nginx
  version: alpine
  upstream:
    version: "1.4.0"
    tarball_url: "https://github.com/defnull/fediwall/releases/download/v1.4.0/fediwall-1.4.0.tgz"
  fediverse_siblings:
    - web-app-mastodon
    - web-app-pixelfed
    - web-app-friendica
  walls:
    - slug: default
      config:
        servers: "{{ lookup('fediwall_active', 'domains') }}"
        tags: []
        accounts: []
        # `loadPublic: true` makes Fediwall poll each server's public
        # timeline. Without one of `loadPublic`/`loadFederated` enabled
        # (and no tags/accounts filter), the wall renders empty because
        # there is nothing to fetch.
        loadPublic: true
        loadFederated: false
        loadTrends: false
        languages: []
        badWords: []
        hideSensitive: true
        hideBots: true
        hideReplies: true
        hideBoosts: false
        limit: 20
        interval: 10
        title: Fediwall
        theme: auto
        showInfobar: true
        showText: true
        showMedia: true
        playVideos: true
  ports:
    local:
      http: 8074
  lifecycle: alpha
  min_storage: 1GB
  cpus: "0.2"
  mem_reservation: 128m
  mem_limit: 256m
  pids_limit: 256
