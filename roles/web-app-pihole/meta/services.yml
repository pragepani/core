# nocheck: shared
oauth2:
  enabled: true
  shared: true
  allowed_groups:
  - '{{ lookup(''rbac_group_path'', application_id=''web-app-pihole'', role=''administrator'') }}'
  origin:
    host: pihole
    port: 80
logout:
  enabled: true
  shared: true
dashboard:
  enabled: true
  shared: true
matomo:
  enabled: true
  shared: true
# nocheck: email
email:
  enabled: false
  shared: true
redis:
  enabled: true
  shared: true
javascript:
  enabled: true
  shared: true
prometheus:
  enabled: true
  shared: true
pihole:
  image: pihole/pihole
  version: latest
  upstream_dns: "{{ NETWORK_PUBLIC_DNS_RESOLVERS }}"
  cpus: "0.5"
  mem_reservation: "128m"
  mem_limit: "256m"
  min_storage: "1GB"
  pids_limit: 512
  ports:
    local:
      http: 8041
      oauth2: 16500
  run_after:
  - web-app-keycloak
  lifecycle: alpha
