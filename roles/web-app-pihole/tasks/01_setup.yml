- name: "Wait for Pi-hole HTTP endpoint"
  wait_for:
    host:     "{{ DOCKER_REACH_HOST }}"
    port:     "{{ lookup('config', application_id, 'services.pihole.ports.local.http') }}"
    delay:    5
    timeout:  120

- name: "Disable Pi-hole native password (OAuth2 handles auth)"
  community.docker.docker_container_exec:
    container: "{{ PIHOLE_CONTAINER }}"
    command: pihole setpassword ''
  when: PIHOLE_OAUTH2_ENABLED | bool
