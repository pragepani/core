- name: "Wait for Pi-hole HTTP endpoint"
  wait_for:
    host:     "{{ DOCKER_REACH_HOST }}"
    port:     "{{ lookup('config', application_id, 'services.pihole.ports.local.http') }}"
    delay:    5
    timeout:  120

- name: "Set Pi-hole admin password"
  ansible.builtin.command: "container exec {{ PIHOLE_CONTAINER }} pihole setpassword {{ PIHOLE_PASSWORD | quote }}"
  become: true
