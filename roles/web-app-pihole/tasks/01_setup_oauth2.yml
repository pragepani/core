- name: "Wait for Keycloak OIDC discovery endpoint"
  uri_retry:
    url: "{{ OIDC.CLIENT.ISSUER_URL }}/.well-known/openid-configuration"
    validate_certs: false
    status_code: 200
  retries: 60
  delay: 10

- name: "Disable Pi-hole native password (OAuth2 handles auth)"
  ansible.builtin.command: "container exec {{ PIHOLE_CONTAINER }} pihole setpassword ''"
  become: true

- name: "Wait for oauth2-proxy to be ready"
  ignore_errors: true
  wait_for:
    host:    "{{ DOCKER_REACH_HOST }}"
    port:    "{{ lookup('config', application_id, 'services.pihole.ports.local.oauth2') }}"
    delay:   5
    timeout: 300

- name: "Wait for pihole HTTPS endpoint to return non-500"
  uri_retry:
    url: "{{ lookup('tls', application_id, 'url.base') }}"
    validate_certs: false
    status_code: [200, 301, 302, 403, 404]
  register: _pihole_https_check
  until: _pihole_https_check.status in [200, 301, 302, 403, 404]
  retries: 30
  delay: 10
  ignore_errors: true
