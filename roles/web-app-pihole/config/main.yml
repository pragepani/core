title:              "Pi-hole"
server:
  csp:
    flags: {}
    whitelist: {}
  domains:
    canonical:
      - pihole.{{ DOMAIN_PRIMARY }}
    aliases: []
compose:
  services:
    # noqa: shared
    oauth2:
      enabled:          true
      origin:
        host:           "pihole"
        port:           "80"
      allowed_groups:
        - "web-app-pihole-administrators"
    logout:
      enabled:          true
      shared:           true
    dashboard:
      enabled:          true
      shared:           true
    matomo:
      enabled:          true
      shared:           true
    email:
      enabled:          false
      shared:           true
    redis:
      enabled:          true
      shared:           true
      backup:
        disabled:       true
      cpus:             "0.25"
      mem_reservation:  "128m"
      mem_limit:        "256m"
      pids_limit:       512
    pihole:
      enabled:          false
      shared:           false
      backup:
        no_stop_required: true
      image:            "pihole/pihole"
      version:          "latest"
      name:             "pihole"
      min_storage:      "1GB"
      port:             80
      cpus:             "0.5"
      mem_reservation:  "128m"
      mem_limit:        "256m"
      pids_limit:       512
  volumes:
    data:               "pihole_data"
    dnsmasq:            "pihole_dnsmasq"
  network:              "pihole"
pihole:
  # Upstream DNS servers (semicolon-separated)
  # Options:
  #   Cloudflare:         "1.1.1.1;1.0.0.1"
  #   Google:             "8.8.8.8;8.8.4.4"
  #   Quad9 (filtered):   "9.9.9.9;149.112.112.112"
  #   Quad9 (unfiltered): "9.9.9.10;149.112.112.10"
  #   OpenDNS:            "208.67.222.222;208.67.220.220"
  #   Custom:             "<your-dns-ip>;<your-secondary-dns-ip>"
  # Override in your inventory file:
  #   applications:
  #     web-app-pihole:
  #       pihole:
  #         upstream_dns: "9.9.9.9;149.112.112.112"
  upstream_dns:         "1.1.1.1;1.0.0.1"
  timezone:             "{{ HOST_TIMEZONE }}"
