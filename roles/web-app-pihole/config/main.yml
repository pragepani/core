title:              "Pi-hole"
server:
  status_codes:
    default:                      [200, 301, 302, 403]
  csp:
    flags: {}
    whitelist: {}
  domains:
    canonical:
      - pihole.{{ DOMAIN_PRIMARY }}
    aliases: []
compose:
  services:
    # noqa: shared
    oauth2:
      enabled:          true
      origin:
        host:           "pihole"
        port:           "80"
      allowed_groups:
        - "{{ [RBAC.GROUP.NAME, 'web-app-pihole-administrator'] | path_join }}"
    logout:
      enabled:          true
      shared:           true
    dashboard:
      enabled:          true
      shared:           true
    matomo:
      enabled:          true
      shared:           true
    email:
      enabled:          false
      shared:           true
    redis:
      enabled:          true
      shared:           true
      backup:
        disabled:       true
      cpus:             "0.25"
      mem_reservation:  "128m"
      mem_limit:        "256m"
      pids_limit:       512
    pihole:
      enabled:          false
      shared:           false
      backup:
        no_stop_required: true
      image:            "pihole/pihole"
      version:          "latest"
      name:             "pihole"
      min_storage:      "1GB"
      port:             80
      cpus:             "0.5"
      mem_reservation:  "128m"
      mem_limit:        "256m"
      pids_limit:       512
  volumes:
    data:               "pihole_data"
    dnsmasq:            "pihole_dnsmasq"
  network:              "pihole"
pihole:
  upstream_dns:         "1.1.1.1;1.0.0.1"
  timezone:             "{{ HOST_TIMEZONE }}"
