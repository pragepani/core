---
# Matrix-deploy variant overrides for web-app-dashboard.
# See docs/contributing/artefact/files/role/variants.md for the file format.

# variant pinning every dynamic services.yml flag to true so the
# matrix exercises the in-group_names branch of web-app-dashboard.

- services:
    asset:
      enabled: true
      shared: true
    logout:
      enabled: true
      shared: true
    matomo:
      enabled: true
      shared: true
    sso:
      enabled: true
      shared: true
    prometheus:
      enabled: true
      shared: true
    simpleicons:
      enabled: true
      shared: true
    css:
      enabled: true
      shared: true
- services:
    asset:
      enabled: false
      shared: false
    logout:
      enabled: false
      shared: false
    matomo:
      enabled: false
      shared: false
    sso:
      enabled: false
      shared: false
    prometheus:
      enabled: false
      shared: false
    simpleicons:
      enabled: false
      shared: false
    css:
      enabled: false
      shared: false
