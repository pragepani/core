---
sso:
  enabled: "{{ 'web-app-keycloak' in group_names }}"
  shared: "{{ 'web-app-keycloak' in group_names }}"
  flavor: oauth2
  oauth2:
    origin:
      host: application
      port: "9090"
    allowed_groups:
      - "{{ lookup('rbac_group_path', application_id='web-app-prometheus', role='administrator') }}"
logout:
  enabled: "{{ 'web-svc-logout' in group_names }}"
  shared: "{{ 'web-svc-logout' in group_names }}"
dashboard:
  enabled: "{{ 'web-app-dashboard' in group_names }}"
  shared: "{{ 'web-app-dashboard' in group_names }}"
matomo:
  enabled: "{{ 'web-app-matomo' in group_names }}"
  shared: "{{ 'web-app-matomo' in group_names }}"
email:
  enabled: "{{ 'web-app-mailu' in group_names }}"
  shared: "{{ 'web-app-mailu' in group_names }}"
# nocheck: playwright-service-flag — css consumer, no Playwright surface (provider: web-svc-css)
css:
  enabled: "{{ 'web-svc-css' in group_names }}"
  shared: "{{ 'web-svc-css' in group_names }}"
# nocheck: dynamic-flag — gated on services.sso.enabled, not on group_names
# nocheck: playwright-service-flag — runtime DOM patch, no probe-able surface flag
javascript:
  enabled: "{{ lookup('config', 'web-app-prometheus', 'services.sso.enabled', False) | bool }}"
  shared: "{{ lookup('config', 'web-app-prometheus', 'services.sso.enabled', False) | bool }}"
# nocheck: playwright-service-flag — self-provider
prometheus:
  enabled: true
  shared: true
  provides:
    - prometheus
  image: prom/prometheus
  version: v3.12.0
  name: prometheus
  cpus: "0.5"
  mem_reservation: 256m
  mem_limit: 512m
  pids_limit: 256
  alerting:
    telegram:
      chat_id: 0
  ports:
    local:
      sso: 16492
      http: 8066
  run_after:
    - web-app-keycloak
  lifecycle: beta
  min_storage: 5GB
alertmanager:
  image: prom/alertmanager
  version: v0.33.0
  name: prometheus-alertmanager
  cpus: "0.25"
  mem_reservation: 64m
  mem_limit: 128m
  pids_limit: 64
  min_storage: 1GB
blackbox-exporter:
  image: prom/blackbox-exporter
  version: v0.28.0
  name: prometheus-blackbox
  cpus: "0.1"
  mem_reservation: 32m
  mem_limit: 64m
  pids_limit: 64
  min_storage: 1GB
cadvisor:
  image: gcr.io/cadvisor/cadvisor
  version: v0.52.1
  name: prometheus-cadvisor
  cpus: "0.25"
  mem_reservation: 64m
  mem_limit: 256m
  pids_limit: 64
  min_storage: 1GB
node-exporter:
  image: prom/node-exporter
  version: v1.11.1
  name: prometheus-node-exporter
  cpus: "0.1"
  mem_reservation: 32m
  mem_limit: 128m
  pids_limit: 64
  min_storage: 1GB
