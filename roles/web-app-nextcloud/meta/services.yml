---
sso:
  enabled: "{{ 'web-app-keycloak' in group_names }}"
  shared: "{{ 'web-app-keycloak' in group_names }}"
  flavor: oidc
  oidc:
    plugin: ""
# nocheck: playwright-service-flag — infrastructural sub-component (TURN/STUN)
coturn:
  enabled: "{{ 'web-svc-coturn' in group_names }}"
  shared: "{{ 'web-svc-coturn' in group_names }}"
logout:
  enabled: "{{ 'web-svc-logout' in group_names }}"
  shared: "{{ 'web-svc-logout' in group_names }}"
ldap:
  enabled: "{{ 'svc-db-openldap' in group_names }}"
  shared: "{{ 'svc-db-openldap' in group_names }}"
dashboard:
  enabled: "{{ 'web-app-dashboard' in group_names }}"
  shared: "{{ 'web-app-dashboard' in group_names }}"
matomo:
  enabled: "{{ 'web-app-matomo' in group_names }}"
  shared: "{{ 'web-app-matomo' in group_names }}"
email:
  enabled: "{{ 'web-app-mailu' in group_names }}"
  shared: "{{ 'web-app-mailu' in group_names }}"
# nocheck: shared
# nocheck: dynamic-flag
# nocheck: playwright-service-flag — DB engine, covered by role-local integration tests
redis:
  backup:
    disabled: true
  enabled: true
  cpus: "1"
  mem_reservation: 1g
  mem_limit: 8g
  pids_limit: 512
# nocheck: playwright-service-flag — DB engine, covered by role-local integration tests
mariadb:
  enabled: true # nocheck: dynamic-flag
  shared: "{{ 'svc-db-mariadb' in group_names }}"
  cpus: "0.75"
  mem_reservation: 512m
  mem_limit: 1.5g
  pids_limit: 512
nextcloud:
  name: nextcloud
  image: nextcloud
  version: 33-fpm-alpine
  min_storage: 20GB
  backup:
    no_stop_required: true
  cpus: "2.0"
  mem_reservation: 2g
  mem_limit: 3g
  pids_limit: 512
  default_quota: "1000000000"
  legacy_login_mask:
    enabled: "{{ not (lookup('config', 'web-app-nextcloud', 'services.sso.enabled') | bool) }}"
  performance:
    php:
      memory_limit: "{{ ((ansible_facts['memtotal_mb'] | int) / 30) | int }}M"
      upload_limit: 5G
      opcache_memory_consumption: "{{ ((ansible_facts['memtotal_mb'] | int) / 30) | int }}M"
  plugins_enabled: true
  plugins:
    appointments:
      enabled: true
    bbb:
      enabled: "{{ 'web-app-bigbluebutton' in group_names | lower }}"
    calendar:
      enabled: true
    collectives:
      enabled: true
    contacts:
      enabled: true
    cospend:
      enabled: true
    deck:
      enabled: "{{ 'web-app-taiga' not in group_names | lower }}"
    drawio:
      enabled: true
    event_update_notification:
      enabled: true
    epubviewer:
      enabled: true
    external:
      enabled: true
    files_bpm:
      enabled: true
    files_linkeditor:
      enabled: true
    fileslibreofficeedit:
      enabled: false
    forms:
      enabled: true
    groupfolders:
      enabled: true
    gpxpod:
      enabled: true
    integration_discourse:
      enabled: false
    integration_gitlab:
      enabled: "{{ 'web-app-gitlab' in group_names | lower }}"
    integration_github:
      enabled: false
    integration_google:
      enabled: true
    integration_mastodon:
      enabled: "{{ 'web-app-mastodon' in group_names | lower }}"
    integration_openai:
      enabled: false
    integration_openproject:
      enabled: "{{ 'web-app-openproject' in group_names | lower }}"
    integration_peertube:
      enabled: "{{ 'web-app-peertube' in group_names | lower }}"
    mail:
      enabled: true
    metadata:
      enabled: true
    news:
      enabled: true
    oidc_login:
      enabled: "{{ lookup('sso_oidc_plugin') == 'oidc_login' }}"
      mandatory: true
      incompatible_plugins:
        - user_oidc
        - sociallogin
    phonetrack:
      enabled: true
    polls:
      enabled: true
    quota_warning:
      enabled: true
    recognize:
      enabled: false
    richdocuments:
      enabled: false
    onlyoffice:
      enabled: true
      incompatible_plugins:
        - richdocuments
        - fileslibreofficeedit
    sociallogin:
      enabled: "{{ lookup('sso_oidc_plugin') == 'sociallogin' }}"
      mandatory: true
      incompatible_plugins:
        - user_oidc
        - oidc_login
    spreed:
      enabled: "{{ lookup('config', 'web-app-nextcloud', 'services.talk.enabled') }}"
    tables:
      enabled: true
    tasks:
      enabled: true
    twofactor_nextcloud_notification:
      enabled: "{{ not (lookup('config', 'web-app-nextcloud', 'services.sso.enabled')) }}"
    twofactor_totp:
      enabled: "{{ not (lookup('config', 'web-app-nextcloud', 'services.sso.enabled')) }}"
    user_ldap:
      enabled: "{{ lookup('config', 'web-app-nextcloud', 'services.ldap.enabled') }}"
      user_directory:
        enabled: true
    user_oidc:
      enabled: "{{ lookup('sso_oidc_plugin') == 'user_oidc' }}"
      mandatory: true
      incompatible_plugins:
        - oidc_login
        - sociallogin
    whiteboard:
      enabled: true
  ports:
    local:
      http: 8001
    public:
      stun_turn: 3480
      stun_turn_tls: 5350
      relay:
        start: 50000
        end: 59999
  run_after:
    - web-app-keycloak
    - web-app-matomo
  lifecycle: beta
proxy:
  name: nextcloud-proxy
  image: nginx
  version: alpine
  backup:
    no_stop_required: true
  cpus: "0.5"
  mem_reservation: 64m
  mem_limit: 256m
  pids_limit: 512
  min_storage: 1GB
cron:
  name: nextcloud-cron
  cpus: "0.25"
  mem_reservation: 128m
  mem_limit: 512m
  pids_limit: 256
  min_storage: 1GB
# nocheck: dynamic-flag
# nocheck: playwright-service-flag — infrastructural sub-component (real-time communication)
talk:
  enabled: "{{ 'web-svc-coturn' in group_names }}"
  name: nextcloud-talk
  image: nextcloud/aio-talk
  version: latest
  backup:
    no_stop_required: false
  turn_server:
    onboard_enabled: "{{ not ( 'web-svc-coturn' in group_names ) }}"
    standalone_enabled: "{{ 'web-svc-coturn' in group_names }}"
  network_mode: bridge
  cpus: "2.0"
  mem_reservation: 1g
  mem_limit: 2g
  pids_limit: 1024
  min_storage: 1GB
whiteboard:
  name: nextcloud-whiteboard
  image: ghcr.io/nextcloud-releases/whiteboard
  version: latest
  backup:
    no_stop_required: true
  cpus: "1"
  mem_reservation: 128m
  mem_limit: 1g
  pids_limit: 1024
  min_storage: 1GB
# nocheck: playwright-service-flag — infrastructural sub-component (collaborative editing)
onlyoffice:
  enabled: "{{ 'web-svc-onlyoffice' in group_names }}"
  shared: "{{ 'web-svc-onlyoffice' in group_names }}"
# nocheck: playwright-service-flag — infrastructural sub-component (collaborative editing)
collabora:
  enabled: "{{ 'web-svc-collabora' in group_names }}"
  shared: "{{ 'web-svc-collabora' in group_names }}"
# nocheck: playwright-service-flag — object store, no Playwright surface
minio:
  enabled: false # nocheck: dynamic-flag
  shared: false # nocheck: dynamic-flag
seaweedfs:
  enabled: "{{ 'web-app-seaweedfs' in group_names }}"
  shared: "{{ 'web-app-seaweedfs' in group_names }}"
talk_recording:
  name: nextcloud-talk-recording
  image: nextcloud/aio-talk-recording
  version: latest
  backup:
    no_stop_required: true
  cpus: "2.0"
  mem_reservation: 2g
  mem_limit: 6g
  pids_limit: 1024
  min_storage: 1GB
# nocheck: playwright-service-flag — verified by web-svc-css provider spec
css:
  enabled: "{{ 'web-svc-css' in group_names }}"
  shared: "{{ 'web-svc-css' in group_names }}"
# nocheck: dynamic-flag
# nocheck: playwright-service-flag — captcha backend, infrastructural
hcaptcha:
  enabled: "{{ HCAPTCHA_ENABLED | bool }}"
prometheus:
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
