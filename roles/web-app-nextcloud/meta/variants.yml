---
# Matrix-deploy variant overrides for web-app-nextcloud.
# See docs/contributing/artefact/files/role/variants.md for the file format.
#
# nocheck: variant-limit: the loosely-coupled (bond<1) bridge partners are too heavy
# to co-host, so each budget-bin of them needs its own variant.
#
# enabled and shared stay coupled (both true or both false). v0 enables every
# tightly-coupled (bond>=1, same-host) service - the host baseline test_order pins.
# Each later variant adds one budget-bin of loosely-coupled (bond<1, separate-host)
# partners; those are excluded from the closure (bond-aware test_order) so they need
# not appear in v0 and can be distributed to keep every host under budget.

- services:
    sso:
      enabled: true
      shared: true
    coturn:
      enabled: true
      shared: true
    logout:
      enabled: true
      shared: true
