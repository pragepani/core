---
- name: Check whether Nextcloud LDAP OCC namespace is available
  command: >
    {{ NEXTCLOUD_DOCKER_EXEC_OCC }} list ldap
  register: nextcloud_admin_ldap_namespace
  changed_when: false
  failed_when: false
  when: lookup('config', application_id, 'addons.user_ldap.enabled', False) | bool

- name: Resolve LDAP-backed Nextcloud administrator identities
  command: >
    {{ NEXTCLOUD_DOCKER_EXEC_OCC }} ldap:search {{ NEXTCLOUD_ADMINISTRATOR_USERNAME }}
  register: nextcloud_admin_ldap_search
  changed_when: false
  failed_when: >
    not ASYNC_ENABLED and
    (nextcloud_admin_ldap_search.rc != 0)
  when:
    - lookup('config', application_id, 'addons.user_ldap.enabled', False) | bool
    - nextcloud_admin_ldap_namespace is defined
    - nextcloud_admin_ldap_namespace.rc == 0
  async: "{{ ASYNC_TIME if ASYNC_ENABLED | bool else omit }}"
  poll: "{{ ASYNC_POLL if ASYNC_ENABLED | bool else omit }}"

- name: Build the list of Nextcloud administrator identities
  set_fact:
    nextcloud_administrator_identities: >-
      {{
        (
          [NEXTCLOUD_ADMINISTRATOR_USERNAME] +
          (
            (
              (nextcloud_admin_ldap_search | default({})).get('stdout', '')
            )
            | regex_findall('\(([^)]+)\)')
          )
        )
        | unique
      }}

- name: Ensure all Nextcloud administrator identities are in the 'admin' group
  command: >
    {{ NEXTCLOUD_DOCKER_EXEC_OCC }} group:adduser admin {{ item }}
  loop: "{{ nextcloud_administrator_identities }}"
  register: nextcloud_admin_group_membership
  changed_when: >
    not ASYNC_ENABLED and
    'Added user' in (nextcloud_admin_group_membership.stdout | default(''))
  failed_when: >
    not ASYNC_ENABLED and
    (nextcloud_admin_group_membership.rc != 0) and
    ('is already a member of' not in (
      (nextcloud_admin_group_membership.stderr | default('')) ~
      (nextcloud_admin_group_membership.stdout | default(''))
    ))
  async: "{{ ASYNC_TIME if ASYNC_ENABLED | bool else omit }}"
  poll: "{{ ASYNC_POLL if ASYNC_ENABLED | bool else omit }}"
