---
# Install-behaviour flags sit at the top level for plugins entries, but under `config:` for addons entries.
- name: "Normalise install flags for {{ plugin_key }}"
  ansible.builtin.set_fact:
    plugin_incompatible: "{{ plugin_value.config.incompatible_plugins | default(plugin_value.incompatible_plugins | default([])) }}"
    plugin_mandatory: "{{ plugin_value.config.mandatory | default(plugin_value.mandatory | default(false)) }}"
  changed_when: false

- name: "Disable incompatible plugins for {{ plugin_key }} (batched shell, no async)"
  ansible.builtin.shell: |
    # do not set -e here; allow per-line fallbacks
    {% for incompatible_plugin in (plugin_incompatible | default([])) %}
    {{ NEXTCLOUD_DOCKER_EXEC_OCC }} app:disable {{ incompatible_plugin }} || true
    {% endfor %}
  args:
    executable: /bin/bash
  when:
    - plugin_incompatible | length > 0
  register: disable_incompat
  changed_when: >
    (((disable_incompat.stdout | default('')) ~ (disable_incompat.stderr | default('')))
      is search('disabled'))
    and (
      (((disable_incompat.stdout | default('')) ~ (disable_incompat.stderr | default('')))
        is not search('already disabled'))
    )
  failed_when: false
  async: "{{ ASYNC_TIME if ASYNC_ENABLED | bool else omit }}"
  poll: "{{ ASYNC_POLL if ASYNC_ENABLED | bool else omit }}"

- name: install {{ plugin_key }} nextcloud plugin
  # Clear NC appstore-fetcher cooldown (300s) before each attempt so retries
  # actually re-fetch the catalog instead of seeing cached empty after a first
  # transient failure right after container start.
  ansible.builtin.shell: |
    {{ NEXTCLOUD_DOCKER_EXEC_OCC }} config:app:delete settings appstore-fetcher-lastFailure >/dev/null 2>&1 || true
    {{ NEXTCLOUD_DOCKER_EXEC_OCC }} app:install {{ plugin_key }}
  args:
    executable: /bin/bash
  register: install_result
  retries: 6
  delay: 30
  until: (install_result | nextcloud_install_status).ok
  failed_when: >
    not (install_result | nextcloud_install_status).ok
    and not (install_result | nextcloud_install_status).unavailable
  changed_when: (install_result | nextcloud_install_status).changed

- name: "Fail: mandatory plugin {{ plugin_key }} is not installable on this Nextcloud version"
  ansible.builtin.fail:
    msg: >-
      Mandatory Nextcloud plugin '{{ plugin_key }}' is
      {{ 'not compatible with' if (install_result | nextcloud_install_status).incompatible else 'not available on the appstore for' }}
      the pinned Nextcloud server version. This plugin gates SSO login, so the
      deployment is aborted instead of provisioning a login-broken instance.
  when:
    - plugin_mandatory | bool
    - not (install_result | nextcloud_install_status).runnable

- name: "warn: {{ plugin_key }} cannot be installed on this Nextcloud version — skipping"
  ansible.builtin.debug:
    msg: >-
      Plugin '{{ plugin_key }}' is {{ 'not compatible with' if (install_result | nextcloud_install_status).incompatible else 'not available on the appstore for' }}
      the currently pinned Nextcloud server version. Skipping enable/configure for this run.
  when: >
    (install_result | nextcloud_install_status).incompatible
    or (install_result | nextcloud_install_status).unavailable

- include_tasks: 02_enable.yml
  when: (install_result | nextcloud_install_status).runnable
  vars:
    plugin_task_path: "{{ NEXTCLOUD_CNODE_PLUGIN_TASKS_PATH }}{{ plugin_key }}.yml"
