---
# Generic config sets only `url`; the OAuth connect flow additionally needs the
# admin keys oauth_instance_url/client_id/client_secret, which only exist once an
# OAuth app is registered on Mattermost. This hook provisions that app on the
# partner and wires the returned credentials into Nextcloud.
- name: Resolve Mattermost partner coupling facts
  set_fact:
    nextcloud_mm_container: "{{ lookup('config', 'web-app-mattermost', 'services.mattermost.name') }}"
    nextcloud_mm_instance_dir: "{{ lookup('container', 'web-app-mattermost', 'directories.instance') }}"
    nextcloud_mm_base_url: "{{ lookup('tls', 'web-app-mattermost', 'url.base') }}"
    nextcloud_mm_local_url: "http://localhost:{{ lookup('config', 'web-app-mattermost', 'services.mattermost.ports.local.http') }}"
    nextcloud_mm_redirect_path: "/apps/integration_mattermost/oauth-redirect"
  changed_when: false

- name: Probe whether the Mattermost partner container is running
  command: >
    container exec {{ nextcloud_mm_container }} true
  register: nextcloud_mm_partner_running
  changed_when: false
  failed_when: false

- name: Provision the bidirectional Mattermost <-> Nextcloud OAuth coupling
  include_tasks: "{{ [role_path, 'tasks/addons/integration_mattermost_provision.yml'] | path_join }}"
  when: nextcloud_mm_partner_running.rc == 0
