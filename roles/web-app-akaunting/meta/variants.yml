---
# Matrix-deploy variant overrides. Both auth-flow
# variants ride the same the `web-app-keycloak` SSO-proxy sidecar (flavor: oauth2) sidecar in front of
# the Akaunting web UI.

# variant 0: OIDC variant (canonical default).

- services:
    dashboard:
      enabled: true
      shared: true
    email:
      enabled: true
      shared: true
    logout:
      enabled: true
      shared: true
    mariadb:
      shared: true
    matomo:
      enabled: true
      shared: true
    sso:
      enabled: true
      shared: true
    prometheus:
      enabled: true
      shared: true
    css:
      enabled: true
      shared: true
    seaweedfs:
      enabled: true
      shared: true
- services:
    dashboard:
      enabled: false
      shared: false
    email:
      enabled: false
      shared: false
    logout:
      enabled: false
      shared: false
    mariadb:
      shared: false
    matomo:
      enabled: false
      shared: false
    sso:
      enabled: false
      shared: false
    prometheus:
      enabled: false
      shared: false
    css:
      enabled: false
      shared: false
    seaweedfs:
      enabled: false
      shared: false
