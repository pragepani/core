---
# Matrix-deploy variant overrides. `ldap` is pinned in `services.yml`
# (`enabled: true`, `shared: true`) because LDAP IS the storage backend
# for FusionDirectory — every variant inherits it, so the variant blocks
# below don't override it.

# variant 0: OIDC variant (canonical default; oauth2-proxy gate).
- services:
    dashboard:
      enabled: true
      shared: true
    email:
      enabled: true
      shared: true
    logout:
      enabled: true
      shared: true
    matomo:
      enabled: true
      shared: true
    sso:
      enabled: true
      shared: true
    prometheus:
      enabled: true
      shared: true

    # variant 1: Keycloak/federation surface off; LDAP-backed only.
    css:
      enabled: true
      shared: true
- services:
    dashboard:
      enabled: false
      shared: false
    email:
      enabled: false
      shared: false
    logout:
      enabled: false
      shared: false
    matomo:
      enabled: false
      shared: false
    sso:
      enabled: false
      shared: false
    prometheus:
      enabled: false
      shared: false

    # variant 2: LDAP-only path explicitly disables oauth2.
    css:
      enabled: false
      shared: false
- services:
    sso:
      enabled: false
      shared: false
    css:
      enabled: false
      shared: false
