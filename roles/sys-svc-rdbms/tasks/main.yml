---
# nocheck: run-once
- name: "For '{{ application_id }}': Freeze database consumer id before provider includes"
  set_fact:
    _database_consumer_id: "{{ database_consumer_id | default(application_id) }}"
  changed_when: false

- name: "For '{{ application_id }}/{{ _database_consumer_id }}': Resolve shared database mode"
  set_fact:
    _sys_svc_rdbms_central_db_enabled: >-
      {{ lookup('database', _database_consumer_id, 'shared') | bool }}
  changed_when: false

- name: "For '{{ application_id }}/{{ _database_consumer_id }}': Apply dedicated database setup"
  include_tasks: dedicated.yml
  when: not (_sys_svc_rdbms_central_db_enabled | bool)

- name: Central Database Logic
  block:
    - name: "For '{{ application_id }}': Assert shared database provider was preloaded"
      ansible.builtin.assert:
        that:
          - >-
            lookup(
              'vars',
              'run_once_' ~ (_database_provider_role | replace('-', '_')),
              default='__missing__'
            ) != '__missing__'
        fail_msg: >-
          Shared database provider '{{ _database_provider_role }}' was not preloaded by
          sys-service-loader before sys-svc-rdbms ran.

    - name: "For '{{ application_id }}': Initialize dedicated database on preloaded provider"
      ansible.builtin.include_role:
        name: "{{ _database_provider_role }}"
      vars:
        application_id: "{{ _database_provider_role }}"
        database_init: true
        compose_repository_pull: false
        database_consumer_id: "{{ _database_consumer_id }}"

    - name: "For '{{ application_id }}': Add Entry for Backup Procedure"
      include_tasks: "{{ playbook_dir }}/roles/svc-bkp-container-2-local/tasks/04_seed-database-to-backup.yml"
      when: "'svc-bkp-container-2-local' in group_names"
  vars:
    _database_provider_role: "{{ lookup('database', _database_consumer_id, 'id') }}"
    database_consumer_id: "{{ _database_consumer_id }}"
    database_type: "{{ _database_type }}"
    database_instance: "{{ lookup('database', _database_consumer_id, 'instance') }}"
    database_host: "{{ lookup('database', _database_consumer_id, 'host') }}"
    database_port: "{{ lookup('database', _database_consumer_id, 'port') }}"
    database_name: "{{ lookup('database', _database_consumer_id, 'name') }}"
    database_username: "{{ lookup('database', _database_consumer_id, 'username') }}"
    database_password: "{{ lookup('database', _database_consumer_id, 'password') }}"
  when: _sys_svc_rdbms_central_db_enabled | bool
