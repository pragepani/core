---
- name: "Delete existing API token for '{{ mailu_user_key }};{{ mailu_user_name }}' if local token missing but remote exists"
  command: >-
    {{ BIN_COMPOSE }} exec -T admin \
      curl -s -X DELETE {{ MAILU_API_SERVICE_BASE_URL }}/token/{{ mailu_user_existing_token.id }} \
        -H "Authorization: Bearer {{ MAILU_API_TOKEN }}"
  args:
    chdir: "{{ MAILU_INSTANCE_DIR }}"
  when:
    - mailu_user_existing_token is not none
    - mailu_user_existing_token.id is defined
  register: mailu_token_delete
  changed_when: mailu_token_delete.rc == 0
  no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"

- name: "Create API token for '{{ mailu_user_key }};{{ mailu_user_name }}' if no local token defined"
  ansible.builtin.command:
    argv:
      - "{{ BIN_COMPOSE }}"
      - exec
      - -T
      - admin
      - curl
      - -sS
      - -f
      - -o
      - "/tmp/mailu-token-{{ mailu_user_key }}.json"
      - -X
      - POST
      - "{{ MAILU_API_SERVICE_BASE_URL }}/token"
      - -H
      - "Authorization: Bearer {{ MAILU_API_TOKEN }}"
      - -H
      - "Content-Type: application/json"
      - -d
      - >-
        {{
          {
            "comment": mailu_token_name,
            "email": lookup("users", mailu_user_key).email,
            "ip": mailu_token_ip
          } | to_json
        }}
  args:
    chdir: "{{ MAILU_INSTANCE_DIR }}"
  register: mailu_token_creation_request
  failed_when: mailu_token_creation_request.rc != 0
  changed_when: mailu_token_creation_request.rc == 0
  no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"

- name: "Read created API token response for '{{ mailu_user_key }};{{ mailu_user_name }}'"
  ansible.builtin.command:
    argv:
      - "{{ BIN_COMPOSE }}"
      - exec
      - -T
      - admin
      - cat
      - "/tmp/mailu-token-{{ mailu_user_key }}.json"
  args:
    chdir: "{{ MAILU_INSTANCE_DIR }}"
  register: mailu_token_creation_response
  changed_when: false
  failed_when: mailu_token_creation_response.stdout | trim == ""
  no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"

- name: "Extract created API token for '{{ mailu_user_key }};{{ mailu_user_name }}'"
  ansible.builtin.set_fact:
    mailu_created_token: >-
      {{
        (
          mailu_token_creation_response.stdout
          | from_json
        ).token | default('')
      }}
  failed_when: mailu_created_token | trim == ""
  no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"

- name: "Persist + inject Mailu API token via sys-token-store"
  ansible.builtin.include_role:
    name: sys-token-store
    tasks_from: write.yml
  vars:
    sys_token_store_user_key: "{{ mailu_user_key }}"
    sys_token_store_app: "{{ application_id }}"
    sys_token_store_token: "{{ mailu_created_token }}"
  no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"
