---
# General
application_id: "web-app-mailu"
http_port: "{{ lookup('config', application_id, 'services.mailu.ports.local.http') }}"
webserver_extra_configuration: "client_max_body_size 31M;"
# Database Configuration
database_password: "{{ lookup('config', application_id, 'credentials.database_password') }}"
# Host Directories
MAILU_VOLUMES_DIR: "{{ lookup('container', application_id, 'directories.volumes') }}"
MAILU_CERT_DIR: "{{ [ MAILU_VOLUMES_DIR, 'certs' ] | path_join }}"
MAILU_OVERRIDES_DIR: "{{ [ MAILU_VOLUMES_DIR, 'overrides' ] | path_join }}"
# Mailu
## Meta 
MAILU_WEBSITE: "{{ lookup('tls', application_id, 'url.base') }}"
# Port 8080 is where gunicorn binds inside the admin container (see start.py in ghcr.io/mailu/admin).
# Calling localhost directly avoids routing through the front nginx proxy, which causes 502s in DinD.
MAILU_API_SERVICE_BASE_URL: "http://localhost:8080/api/v1"
## Domains
MAILU_DOMAIN: "{{ lookup('config', application_id, 'services.mailu.domain') }}"
MAILU_DOMAIN_DNS_ZONE: "{{ MAILU_DOMAIN | to_zone }}"
MAILU_EMAIL: "{{ lookup('email', application_id) }}"
MAILU_HOSTNAME: "{{ MAILU_EMAIL.host }}"
MAILU_HOSTNAME_DNS_ZONE: "{{ MAILU_HOSTNAME | to_zone }}"
## Docker
MAILU_VERSION: "{{ lookup('config', application_id, 'services.mailu.version') }}"
MAILU_CONTAINER: "{{ lookup('config', application_id, 'services.mailu.name') }}"
MAILU_ANTIVIRUS_IMAGE: "{{ lookup('config', application_id, 'services.antivirus.image') }}"
MAILU_ANTIVIRUS_VERSION: "{{ lookup('config', application_id, 'services.antivirus.version') }}"
MAILU_FRONT_SERVICE: "front"
## Volumes
MAILU_SMTP_QUEUE_VOLUME: "mailu_smtp_queue"
MAILU_ADMIN_DATA_VOLUME: "mailu_admin_data"
MAILU_WEBDAV_DATA: "mailu_webdav_data"
MAILU_WEBMAIL_DATA: "mailu_webmail_data"
MAILU_FILTER_VOLUME: "mailu_filter"
MAILU_DKIM_VOLUME: "mailu_dkim"
MAILU_DOVECOT_MAIL_VOLUME: "mailu_dovecot_mail"
MAILU_CLAMAV_VOLUME: "mailu_clamav_data"
## Network
MAILU_DNS_RESOLVER: "{{ lookup('config', 'web-app-mailu', 'server.networks.local.dns_resolver') }}"
MAILU_IP4_PUBLIC: "{{ DOCKER_PUBLIC_BIND_HOST }}"
MAILU_IP6_PUBLIC: "" # Deactivated atm. but cloudflare logic present @todo activate it when it's configured for docker.
MAILU_SUBNET: "{{ lookup('config', 'web-app-mailu', 'server.networks.local.subnet') }}"
## Credentials
MAILU_SECRET_KEY: "{{ lookup('config', application_id, 'credentials.secret_key') }}"
MAILU_API_TOKEN: "{{ lookup('config', application_id, 'credentials.api_token') }}"
## OIDC
MAILU_OIDC_HOST: "{{ lookup('domain','web-app-keycloak') }}"
MAILU_OIDC_ENABLED: "{{ lookup('config', application_id, 'services.sso.enabled') }}"
MAILU_OIDC_EMAIL_BY_USERNAME_ENABLED: "{{ lookup('config', application_id, 'services.sso.oidc.email_by_username') }}"
MAILU_OIDC_ENABLE_USER_CREATION: "{{ lookup('config', application_id, 'services.sso.oidc.enable_user_creation') | string | capitalize }}"
# Use dedicated source for oidc if activated  
# @see https://github.com/heviat/Mailu-OIDC/tree/2024.06
MAILU_DOCKER_FLAVOR: "{{ 'ghcr.io/heviat' if MAILU_OIDC_ENABLED | bool else 'ghcr.io/mailu' }}"
MAILU_DMARC_RUF: "{{ lookup('config', application_id, 'users.administrator.email') }}"
MAILU_DKIM_KEY_FILE: "{{ MAILU_DOMAIN }}.dkim.key"
MAILU_DKIM_KEY_PATH: "/dkim/{{ MAILU_DKIM_KEY_FILE }}"
## Unbound
# Set to true in WSL2/DinD environments where iterative DNS resolution via
# root-hints is not supported. Forwards all queries to public resolvers instead.
# On bare-metal this must remain false to preserve DNSSEC validation.
MAILU_UNBOUND_FORWARD_DNS: "{{ 'microsoft' in lookup('file', '/proc/version') | lower }}"
## Rspamd
MAILU_UNBOUND_CONF_FILE: "{{ [ MAILU_OVERRIDES_DIR, 'unbound/unbound.conf' ] | path_join }}"
MAILU_RSPAMD_HOST_DIR: "{{ [ MAILU_OVERRIDES_DIR, 'rspamd' ] | path_join }}"
MAILU_RSPAMD_HOST_FILE: "{{ [ MAILU_RSPAMD_HOST_DIR,'ratelimit.conf' ] | path_join }}"
MAILU_RSPAMD_LIMITS_DEFAULTS:
  RATE: "30 / 1min"
  BURST: 50
