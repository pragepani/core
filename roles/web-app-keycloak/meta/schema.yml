---
credentials:
  # Per-consumer cookie secret for the SSO-proxy sidecar (flavor: oauth2).
  # Provisioned dynamically into each consumer's `credentials:` map by
  # `utils/manager/inventory.py._apply_one_role_special_rules` whenever
  # the consumer's services.sso.enabled is truthy. Declared here so the
  # cross-role `lookup('config', sso_proxy_application_id, ...)` call
  # in templates/sso_proxy/oauth2-proxy-keycloak.cfg.j2 resolves.
  sso_proxy_cookie_secret:
    description: Cookie secret for the SSO-proxy sidecar (hex string, 32 characters, generated via `openssl rand -hex 16`)
    algorithm: plain
    validation: ^.*$
  administrator_password:
    description: Password for the Keycloak administrator user (used in bootstrap and CLI access)
    algorithm: sha256
    validation: ^[a-f0-9]{64}$
  recaptcha:
    key:
      description: Runtime credential value imported from meta/services.yml for 'key'.
      algorithm: plain
      default: "{{ CAPTCHA.RECAPTCHA.KEY }}"
    secret:
      description: Runtime credential value imported from meta/services.yml for 'secret'.
      algorithm: plain
      default: "{{ CAPTCHA.RECAPTCHA.SECRET }}"
