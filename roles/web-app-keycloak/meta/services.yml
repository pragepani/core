---
# nocheck: dynamic-flag
# nocheck: logout
logout:
  enabled: false
  shared: false
ldap:
  enabled: "{{ 'svc-db-openldap' in group_names }}"
  shared: "{{ 'svc-db-openldap' in group_names }}"
  sync:
    period:
      changes: 900
      full: 86400
dashboard:
  enabled: "{{ 'web-app-dashboard' in group_names }}"
  shared: "{{ 'web-app-dashboard' in group_names }}"
matomo:
  enabled: "{{ 'web-app-matomo' in group_names }}"
  shared: "{{ 'web-app-matomo' in group_names }}"
email:
  enabled: "{{ 'web-app-mailu' in group_names }}"
  shared: "{{ 'web-app-mailu' in group_names }}"
# nocheck: playwright-service-flag — self-provider
keycloak:
  enabled: true
  shared: true
  provides: sso
  image: quay.io/keycloak/keycloak
  version: latest
  name: keycloak
  min_storage: 5GB
  cpus: "2.0"
  mem_reservation: 2g
  mem_limit: 4g
  pids_limit: 1024
  realm:
    import_enabled: true
    totp_enabled: true
  users:
    emails_verified: true
  scopes:
    nextcloud: nextcloud
    moodle: moodle
  accounts:
    bootstrap:
      username: administrator
    system:
      username: "{{ SOFTWARE_NAME | replace('.', '_') | lower }}"
  ports:
    local:
      http: 8032
  run_after:
    - web-app-matomo
    - web-app-mailu
  lifecycle: beta
# Per-consumer SSO-proxy sidecar. Rendered via tasks/sso_proxy.yml
# whenever a consumer role's `services.sso.flavor == 'oauth2'`.
# The image name `oauth2-proxy` and config filename
# `oauth2-proxy-keycloak.cfg` are upstream artefacts and stay literal;
# every project-internal identifier uses the `sso_proxy` namespace.
# nocheck: dynamic-flag — per-consumer fan-out
# nocheck: playwright-service-flag — sidecar shape, no probe-able surface flag
sso_proxy:
  image: quay.io/oauth2-proxy/oauth2-proxy
  version: latest
  min_storage: 1GB
  configuration_file: oauth2-proxy-keycloak.cfg
  ports:
    internal:
      http: 4180
  lifecycle: pre-alpha
  cpus: "0.25"
  mem_reservation: "64m"
  mem_limit: "128m"
  pids_limit: 256
# nocheck: playwright-service-flag — DB engine, covered by role-local integration tests
postgres:
  enabled: true # nocheck: dynamic-flag
  shared: "{{ 'svc-db-postgres' in group_names }}"
# nocheck: playwright-service-flag — css consumer, no Playwright surface (provider: web-svc-css)
css:
  enabled: "{{ 'web-svc-css' in group_names }}"
  shared: "{{ 'web-svc-css' in group_names }}"
# nocheck: dynamic-flag
# nocheck: playwright-service-flag — captcha backend, infrastructural
recaptcha:
  enabled: "{{ RECAPTCHA_ENABLED | bool }}"
prometheus:
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
