---
- name: "Include role sys-stk-front-proxy for {{ application_id }}"
  include_role:
    name: sys-stk-front-proxy
  loop: "{{ JOOMLA_DOMAINS }}"
  loop_control:
    loop_var: domain
  vars:
    http_port: "{{ lookup('config', application_id, 'services.joomla.ports.local.http') }}"

- name: "load docker and db for {{ application_id }}"
  include_role:
    name: sys-stk-backend
  vars:
    compose_handlers_flush: false

- name: Include PHP Config tasks
  include_tasks: 01_config.yml

- name: flush docker service
  meta: flush_handlers

- name: Include install routines
  include_tasks: "{{ joomla_step }}"
  loop:
    - 02_install.yml
    - 03_debug.yml
    - 04_patch.yml
  loop_control:
    loop_var: joomla_step

- name: Include assert routines
  include_tasks: "05_assert.yml"
  when: MODE_ASSERT | bool

- name: Reset Admin Password
  include_tasks: 06_reset_admin_password.yml
  # Skip on a fresh install: the CLI installer above already set the admin
  # password via --admin-password, so an immediate reset is redundant. It
  # also races: Joomla's CLI bootstraps a fresh session per invocation and
  # `user:reset-password` has been observed to report
  # "The user <name> does not exist!" right after install (image-init /
  # service-container warm-up). The reset is only needed on subsequent
  # deploys, where it enforces password rotation against an existing user.
  when: joomla_installed.rc == 0

- name: "Install plg_system_keycloak (native OIDC)"
  include_tasks: 07_oidc_plugin.yml
  when: lookup('config', application_id, 'services.sso.enabled') | bool
