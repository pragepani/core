---
# General
application_id: "web-app-postmarks"

# Container
container_port: 3000
domain: "{{ container_hostname }}"
http_port: "{{ lookup('config', application_id, 'services.postmarks.ports.local.http') }}"
container_hostname: "{{ lookup('domain', application_id) }}"

# App container
POSTMARKS_CONTAINER: "{{ lookup('config', application_id, 'services.application.name') }}"
POSTMARKS_IMAGE: "{{ lookup('config', application_id, 'services.application.image') }}"
POSTMARKS_VERSION: "{{ lookup('config', application_id, 'services.application.version') }}"

# Source
POSTMARKS_REPO_URL: "{{ lookup('config', application_id, 'services.application.repository') }}"
POSTMARKS_REF: "{{ lookup('config', application_id, 'services.application.ref') }}"

# Trusted-header SSO bridge
POSTMARKS_SSO_PROXY_GATED: "{{ lookup('sso', application_id, 'is_proxy_gated') }}"
POSTMARKS_SSO_ADMIN_GROUP: "/{{ lookup('rbac_group_path', application_id=application_id, role='administrator') }}"
