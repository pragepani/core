---
# nocheck: seaweedfs-required — object storage not implemented for this role
sso:
  bond: 1
  enabled: "{{ 'web-app-keycloak' in group_names }}"
  shared: "{{ 'web-app-keycloak' in group_names }}"
  flavor: oidc
logout:
  bond: 1
  enabled: "{{ 'web-svc-logout' in group_names }}"
  shared: "{{ 'web-svc-logout' in group_names }}"
dashboard:
  bond: 1
  enabled: "{{ 'web-app-dashboard' in group_names }}"
  shared: "{{ 'web-app-dashboard' in group_names }}"
matomo:
  bond: 1
  enabled: "{{ 'web-app-matomo' in group_names }}"
  shared: "{{ 'web-app-matomo' in group_names }}"
email:
  bond: 1
  enabled: "{{ 'web-app-mailu' in group_names }}"
  shared: "{{ 'web-app-mailu' in group_names }}"
ldap:
  bond: 1
  enabled: "{{ 'svc-db-openldap' in group_names }}"
  shared: "{{ 'svc-db-openldap' in group_names }}"
# nocheck: playwright-service-flag — DB engine, covered by role-local integration tests
mariadb:
  bond: 1
  enabled: true # nocheck: dynamic-flag
  shared: "{{ 'svc-db-mariadb' in group_names }}"
# nocheck: playwright-service-flag: shared provider entity; the app itself is covered by this role's own Playwright spec
moodle:
  bond: 1
  enabled: true
  shared: true
  # Self-built image. The `image`+`version` pair is the PHP base the
  # Dockerfile builds FROM (php:8.3-fpm) — this is also what GHCR
  # image-mirror discovery picks up, so the base stays cached.
  # The Moodle source itself is pinned via `branch` (Git branch on
  # git.moodle.org, naming: stable<MAJOR>0<MINOR>, e.g. 4.5 -> stable405)
  # and `release` (tarball version). 4.5 is LTS, security-supported
  # until 2027-10; Moodle 5.x reorganises the code under public/* and
  # is deferred to a follow-up requirement.
  branch: stable405
  release: 4.5.11
  image: php
  # Moodle 4.5 LTS rejects PHP >= 8.4 at install ("version 8.4 and higher
  # are not supported"). Pin to 8.3 and skip auto-bumps until Moodle
  # supports a newer line.
  # nocheck: docker-version
  version: "8.3-fpm"
  name: moodle
  min_storage: 10GB
  cpus: 1.0
  mem_reservation: 1g
  mem_limit: 2g
  pids_limit: 512
  site_titel: Academy on {{ DOMAIN_PRIMARY }}
  ports:
    local:
      http: 8026
  run_after:
    - web-app-keycloak
  lifecycle: beta
nginx:
  image: nginx
  version: 1.31-alpine
  name: moodle-nginx
  min_storage: 1GB
  cpus: "0.2"
  mem_reservation: 128m
  mem_limit: 256m
  pids_limit: 256
cron:
  name: moodle-cron
  min_storage: 1GB
  cpus: "0.2"
  mem_reservation: 128m
  mem_limit: 256m
  pids_limit: 256
# nocheck: playwright-service-flag — verified by web-svc-css provider spec
css:
  bond: 1
  enabled: "{{ 'web-svc-css' in group_names }}"
  shared: "{{ 'web-svc-css' in group_names }}"
prometheus:
  bond: 1
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
