---
- include_tasks: utils/once/flag.yml

- name: "load docker, db and proxy for {{ application_id }}"
  include_role:
    name: sys-stk-full
  vars:
    compose_handlers_flush: false

- name: "Populate Dockerfile build context (entrypoint, config.php, install scripts, php conf)"
  include_tasks: 01_build_context.yml

- name: "Ensure nginx vhost dir exists in compose dir"
  ansible.builtin.file:
    path: "{{ docker_compose.directories.instance | default(lookup('container', application_id, 'directories.instance')) }}"
    state: directory
    mode: "0755"

- name: "Render nginx vhost into compose dir"
  ansible.builtin.template:
    src: "nginx-moodle.conf.j2"
    dest: "{{ docker_compose.directories.instance | default(lookup('container', application_id, 'directories.instance')) }}/nginx.conf"
    mode: "0640"
  notify: compose up

- name: flush docker service
  meta: flush_handlers

- name: Wait for Moodle container to become healthy
  block:
    - name: Wait until the Moodle container is healthy
      ansible.builtin.shell: >
        container inspect --format '{% raw %}{{.State.Health.Status}}{% endraw %}' {{ MOODLE_CONTAINER }}
      register: health_check
      until: health_check.stdout.strip() == "healthy"
      retries: 120
      delay: 5

  rescue:
    - name: Show Moodle container status
      ansible.builtin.shell: >
        container inspect {{ MOODLE_CONTAINER }}
      register: moodle_inspect
      changed_when: false
      failed_when: false

    - name: Show Moodle container logs
      ansible.builtin.shell: >
        container logs --tail=200 {{ MOODLE_CONTAINER }}
      register: moodle_logs
      changed_when: false
      failed_when: false

    - name: Fail with diagnostic output
      ansible.builtin.fail:
        msg: |
          ❌ Moodle container did not become healthy in time.

          --- container inspect ---
          {{ moodle_inspect.stdout | default('no output') }}

          --- container logs (last 200 lines) ---
          {{ moodle_logs.stdout | default('no output') }}

- name: "Run Moodle install (idempotent)"
  command: >
    container exec --user {{ MOODLE_RUNTIME_USER }} {{ MOODLE_CONTAINER }}
    php {{ MOODLE_CLI_DIR }}/install_database.php
    --agree-license
    --adminuser={{ lookup('config', application_id, 'users.administrator.username') }}
    --adminpass={{ lookup('config', application_id, 'credentials.user_password') | quote }}
    --adminemail={{ lookup('config', application_id, 'users.administrator.email') }}
    --fullname="{{ MOODLE_SITE_TITLE }}"
    --shortname=Academy
  register: moodle_install
  changed_when: "'Moodle has been installed' in moodle_install.stdout"
  failed_when:
    - moodle_install.rc != 0
    - "'Moodle is already installed' not in moodle_install.stderr"
    - "'already installed' not in moodle_install.stdout"
    - "'Database tables already present' not in moodle_install.stderr"
  no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"

- name: "Include ownership settings tasks for moodle"
  include_tasks: 02_ownership.yml

- name: "Configure OIDC login for Moodle (variant 0 only)"
  include_tasks: 03_oidc.yml
  when: MOODLE_OIDC_ENABLED | bool

- name: "Configure auth_ldap (sync-only in variant 0, primary login in variant 1)"
  include_tasks: 04_ldap_sync.yml
  when: MOODLE_LDAP_ENABLED | bool
