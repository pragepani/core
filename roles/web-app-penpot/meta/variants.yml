---
# Matrix-deploy variant overrides for web-app-penpot.
# See docs/contributing/artefact/files/role/variants.md for the file format.

# Variant pinning every dynamic services.yml flag to true so the matrix
# exercises the in-group_names branch of web-app-penpot.
- services:
    css:
      enabled: true
      shared: true
    dashboard:
      enabled: true
      shared: true
    email:
      enabled: true
      shared: true
    ldap:
      enabled: true
      shared: true
    logout:
      enabled: true
      shared: true
    matomo:
      enabled: true
      shared: true
    sso:
      enabled: true
      shared: true
    postgres:
      shared: true
    prometheus:
      enabled: true
      shared: true
# Variant pinning every dynamic services.yml flag to false.
- services:
    css:
      enabled: false
      shared: false
    dashboard:
      enabled: false
      shared: false
    email:
      enabled: false
      shared: false
    ldap:
      enabled: false
      shared: false
    logout:
      enabled: false
      shared: false
    matomo:
      enabled: false
      shared: false
    sso:
      enabled: false
      shared: false
    postgres:
      shared: false
    prometheus:
      enabled: false
      shared: false
# LDAP-only variant: LDAP bind login on, OIDC/SSO off, so the matrix
# exercises the LDAP authentication branch in isolation.
- services:
    ldap:
      enabled: true
      shared: true
    sso:
      enabled: false
      shared: false
    css:
      enabled: false
      shared: false
    dashboard:
      enabled: false
      shared: false
    email:
      enabled: false
      shared: false
    logout:
      enabled: false
      shared: false
    matomo:
      enabled: false
      shared: false
    prometheus:
      enabled: false
      shared: false
