---
# nocheck: seaweedfs-playwright — S3 backs work-package attachments (embedded FOG storage); no standalone object-browser surface to script, consistent with the playwright-service-flag exemption on the seaweedfs key.
logout:
  bond: 1
  enabled: "{{ 'web-svc-logout' in group_names }}"
  shared: "{{ 'web-svc-logout' in group_names }}"
# nocheck: playwright-service-flag — identity backend, no Playwright surface (verified by the OIDC bridge specs)
ldap:
  bond: 1
  enabled: "{{ 'svc-db-openldap' in group_names }}"
  shared: "{{ 'svc-db-openldap' in group_names }}"
dashboard:
  bond: 1
  enabled: "{{ 'web-app-dashboard' in group_names }}"
  shared: "{{ 'web-app-dashboard' in group_names }}"
matomo:
  bond: 1
  enabled: "{{ 'web-app-matomo' in group_names }}"
  shared: "{{ 'web-app-matomo' in group_names }}"
email:
  bond: 1
  enabled: "{{ 'web-app-mailu' in group_names }}"
  shared: "{{ 'web-app-mailu' in group_names }}"
# nocheck: playwright-service-flag — DB engine, covered by role-local integration tests
postgres:
  bond: 1
  enabled: true # nocheck: dynamic-flag
  shared: "{{ 'svc-db-postgres' in group_names }}"
# nocheck: playwright-service-flag — object store, no Playwright surface
minio:
  enabled: false # nocheck: dynamic-flag
  shared: false # nocheck: dynamic-flag
# nocheck: playwright-service-flag — object store, no Playwright surface
seaweedfs:
  bond: 1
  enabled: "{{ 'web-app-seaweedfs' in group_names }}"
  shared: "{{ 'web-app-seaweedfs' in group_names }}"
web:
  name: openproject-web
  image: openproject/openproject
  version: "17"
  backup:
    no_stop_required: true
  cpus: "3.0"
  mem_reservation: 3g
  # `rails db:migrate` from the existing web container peaks ~5 GB during
  # asset/class-load on a fresh schema; CI hit rc=137 (OOM) at 4g limit.
  mem_limit: 6g
  pids_limit: 2048
  min_storage: 5GB
seeder:
  name: openproject-seeder
  cpus: "0.3"
  mem_reservation: 256m
  mem_limit: 512m
  pids_limit: 256
  min_storage: 1GB
cron:
  name: openproject-cron
  cpus: "0.3"
  mem_reservation: 256m
  mem_limit: 512m
  pids_limit: 256
  min_storage: 1GB
worker:
  name: openproject-worker
  cpus: "2.0"
  mem_reservation: 2g
  mem_limit: 3g
  pids_limit: 2048
  min_storage: 5GB
proxy:
  name: openproject-proxy
  cpus: "0.3"
  mem_reservation: 256m
  mem_limit: 512m
  pids_limit: 256
  min_storage: 1GB
cache:
  name: openproject-cache
  cpus: "0.3"
  mem_reservation: 512m
  mem_limit: 512m
  pids_limit: 256
  min_storage: 1GB
sso:
  bond: 1
  enabled: "{{ 'web-app-keycloak' in group_names }}"
  shared: "{{ 'web-app-keycloak' in group_names }}"
  flavor: oauth2
  oauth2:
    origin:
      host: proxy
      port: "80"
    acl:
      whitelist:
        - /users/me
        - /api/
        - /oauth/token
# nocheck: playwright-service-flag — css consumer, no Playwright surface (provider: web-svc-css)
css:
  bond: 1
  enabled: "{{ 'web-svc-css' in group_names }}"
  shared: "{{ 'web-svc-css' in group_names }}"
prometheus:
  bond: 1
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
# nocheck: playwright-service-flag: shared provider entity; the app itself is covered by this role's own Playwright spec
openproject:
  bond: 1
  enabled: true
  shared: true
  repository: https://github.com/opf/openproject-deploy
  ref: "stable/{{ lookup('config', 'web-app-openproject', 'services.web.version') }}"
  ldap:
    filters:
      administrators: false
      users: false
  ports:
    local:
      sso: 16483
      http: 8023
  run_after:
    - web-app-keycloak
  lifecycle: beta
  min_storage: 10GB
  cpus: "1.0"
  mem_reservation: 1g
  mem_limit: 2g
  pids_limit: 1024
