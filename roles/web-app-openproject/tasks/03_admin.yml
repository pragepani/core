---
- name: Ensure administrator user exists and is admin
  ansible.builtin.command:
    argv:
      - container
      - exec
      - -i
      - -e
      - "OPENPROJECT_ADMIN_PASSWORD={{ OPENPROJECT_ADMINISTRATOR_PASSWORD }}"
      - -e
      - "OPENPROJECT_ADMIN_LOGIN={{ OPENPROJECT_ADMINISTRATOR_USERNAME }}"
      - -e
      - "OPENPROJECT_ADMIN_EMAIL={{ OPENPROJECT_ADMINISTRATOR_EMAIL }}"
      - "{{ OPENPROJECT_WEB_CONTAINER }}"
      - bash
      - -lc
      - "cd /app && bundle exec rails runner -"
    stdin: "{{ lookup('file', 'ruby/ensure_admin_user.rb') }}"
  no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"

- name: Link administrator to the LDAP auth source so the trusted-header bridge can resolve it
  ansible.builtin.command:
    argv:
      - container
      - exec
      - -i
      - -e
      - "OPENPROJECT_LDAP_NAME={{ OPENPROJECT_LDAP.name }}"
      - -e
      - "OPENPROJECT_ADMIN_LOGIN={{ OPENPROJECT_ADMINISTRATOR_USERNAME }}"
      - "{{ OPENPROJECT_WEB_CONTAINER }}"
      - bash
      - -lc
      - "cd /app && bundle exec rails runner -"
    stdin: "{{ lookup('file', 'ruby/link_admin_to_ldap.rb') }}"
  when: OPENPROJECT_HEADER_SSO_ENABLED | bool
  register: openproject_ldap_link
  changed_when: "'Linked' in openproject_ldap_link.stdout"
